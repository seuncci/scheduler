<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/base-layout}">
<main layout:fragment="content">
    <div id="toast"
         class="fixed top-[-100px] left-1/2 -translate-x-1/2 z-[10000] w-full max-w-sm transition-all duration-500 ease-in-out">
        <div id="toast-container" class="mx-4 px-4 py-3 rounded-lg shadow-md flex items-center justify-center gap-2 border bg-white">
            <i id="toast-icon" class="fa-solid"></i>
            <span id="toast-message" class="font-medium text-sm text-center"></span>
        </div>
    </div>

    <div class="max-w-7xl mx-auto p-6">
        <div class="flex flex-col md:flex-row gap-6">
            <th:block th:replace="~{fragments/profile-sidebar :: menu('group')}"></th:block>

            <div class="flex-1 flex flex-col gap-6">
                <th:block th:replace="~{fragments/profile-sidebar :: summary('info')}"></th:block>

                <section class="bg-white p-8 rounded-2xl shadow-sm border border-gray-200 min-h-[600px] flex flex-col">
                    <th:block th:replace="~{fragments/group-header :: header('members')}"></th:block>

                    <div class="flex-1 flex flex-col">
                        <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-6">
                            <div class="flex items-center gap-4">
                                <h4 class="text-sm font-bold text-gray-700">그룹 멤버 <span th:text="${group.memberCount}" class="text-indigo-500 ml-1"></span></h4>

                                <select onchange="changeSort(this.value)" class="bg-gray-50 border border-gray-200 text-gray-500 text-[11px] font-bold rounded-lg px-2 py-1.5 outline-none focus:border-indigo-300 transition-all cursor-pointer">
                                    <option value="gm.lastJoinedDate,desc" th:selected="${param.sort == null or param.sort[0] == 'gm.lastJoinedDate,desc'}">최근 가입순</option>
                                    <option value="m.name,asc" th:selected="${param.sort != null and param.sort[0] == 'm.name,asc'}">이름순</option>
                                </select>
                            </div>

                            <button th:if="${group.role.name == '관리자'}" onclick="openInviteMemberModal()" class="text-xs font-bold text-gray-600 hover:text-black transition-colors flex items-center gap-1">
                                <i class="fa-solid fa-user-plus"></i> 멤버 초대하기
                            </button>
                        </div>

                        <div class="overflow-x-auto">
                            <table class="w-full text-left border-collapse">
                                <thead>
                                <tr class="border-b border-gray-100 bg-gray-50/30">
                                    <th class="px-2 py-4 text-[12px] font-bold text-gray-600 uppercase tracking-tight">사용자</th>
                                    <th class="px-2 py-4 text-[12px] font-bold text-gray-600 uppercase tracking-tight">이메일</th>
                                    <th class="px-2 py-4 text-[12px] font-bold text-gray-600 uppercase tracking-tight">역할</th>
                                    <th th:if="${group.role.name == '관리자'}"
                                        class="px-4 py-4 text-[12px] font-bold text-gray-600 uppercase tracking-tight text-right w-[120px]">
                                        관리
                                    </th>
                                </tr>
                                </thead>
                                <tbody class="divide-y divide-gray-50">
                                <tr th:each="member : ${members}" class="group hover:bg-gray-50/50 transition-colors">
                                    <td class="px-2 py-4">
                                        <div class="flex items-center gap-3">
                                            <img th:src="@{|${#strings.isEmpty(member.profileImage) ? '/images/default-profile.png' : '/member/' + member.profileImage}|}" class="w-9 h-9 rounded-lg border border-gray-100 object-cover">
                                            <span th:text="${member.name}" class="text-sm font-bold text-gray-800"></span>
                                            <span th:if="${member.role.name == '관리자'}" class="px-1.5 py-0.5 bg-gray-800 text-[9px] text-white font-bold rounded">OWNER</span>
                                        </div>
                                    </td>
                                    <td th:text="${member.email}" class="px-2 py-4 text-sm text-gray-500 font-medium"></td>
                                    <td th:text="${member.role.name}" class="px-2 py-4 text-sm text-gray-500 font-semibold"></td>
                                    <td th:if="${group.role.name == '관리자'}" class="px-4 py-4 text-right">
                                        <div th:if="${member.role.name == '멤버'}" class="flex items-center justify-end gap-1">
                                            <button type="button"
                                                    th:data-id="${member.memberId}"
                                                    th:data-name="${member.name}"
                                                    onclick="handleTransferClick(this)"
                                                    class="px-3 py-2 text-indigo-400 hover:text-indigo-600 hover:bg-indigo-50 rounded-xl text-[11px] font-bold transition-all border border-transparent hover:border-indigo-100 shrink-0 whitespace-nowrap"
                                                    title="소유권 위임">
                                                <i class="fa-solid fa-crown text-[16px]"></i>
                                            </button>
                                            <button
                                                    type="button"
                                                    th:data-id="${member.memberId}"
                                                    th:data-name="${member.name}"
                                                    onclick="handleKickClick(this)"
                                                    class="px-2 py-1.5 text-red-400 hover:text-red-600 hover:bg-red-50 rounded-lg text-[11px] font-bold transition-all border border-transparent hover:border-red-100 shrink-0 whitespace-nowrap">
                                                내보내기
                                            </button>
                                        </div>
                                    </td>
                                </tr>
                                </tbody>
                            </table>
                        </div>

                        <div th:if="${members.totalPages > 1}"
                             class="flex items-center justify-center gap-1.5 pt-10 mt-auto border-t border-gray-100">

                            <a th:href="@{/members/me/groups/{id}(id=${group.id}, page=${members.number - 1}, sort=${param.sort})}"
                               th:classappend="${members.first} ? 'opacity-50 cursor-not-allowed' : 'hover:bg-gray-100 hover:text-gray-900'"
                               class="w-9 h-9 flex items-center justify-center rounded-xl text-gray-400 transition-all">
                                <i class="fa-solid fa-angle-left text-xs"></i>
                            </a>

                            <th:block th:each="page : ${#numbers.sequence(0, members.totalPages - 1)}">
                                <button th:if="${page == members.number}"
                                        class="w-9 h-9 flex items-center justify-center rounded-xl text-xs font-extrabold bg-gray-900 text-white shadow-lg shadow-gray-300 translate-y-[-1px]">
                                    <span th:text="${page + 1}">1</span>
                                </button>

                                <a th:if="${page != members.number}"
                                   th:href="@{/members/me/groups/{id}(id=${group.id}, page=${page}, sort=${param.sort})}"
                                   class="w-9 h-9 flex items-center justify-center rounded-xl text-xs font-bold text-gray-600 bg-gray-50 hover:bg-gray-100 hover:text-gray-900 transition-all">
                                    <span th:text="${page + 1}">2</span>
                                </a>
                            </th:block>

                            <a th:href="@{/members/me/groups/{id}(id=${group.id}, page=${members.number + 1}, sort=${param.sort})}"
                               th:classappend="${members.last} ? 'opacity-50 cursor-not-allowed' : 'hover:bg-gray-100 hover:text-gray-900'"
                               class="w-9 h-9 flex items-center justify-center rounded-xl text-gray-400 transition-all">
                                <i class="fa-solid fa-angle-right text-xs"></i>
                            </a>
                        </div>
                    </div>
                </section>
            </div>
        </div>
    </div>

    <div id="inviteMemberModal" class="hidden fixed inset-0 bg-black/50 backdrop-blur-sm z-[9999] flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-md rounded-2xl shadow-2xl overflow-hidden animate-in zoom-in duration-300">
            <div class="px-8 py-6 bg-gray-50 border-b border-gray-100 flex justify-between items-center">
                <h3 class="text-lg font-bold text-gray-900">멤버 초대하기</h3>
                <button onclick="closeInviteMemberModal()" class="text-gray-400 hover:text-black">
                    <i class="fa-solid fa-xmark text-lg"></i>
                </button>
            </div>
            <form id="inviteMemberForm" class="p-8 space-y-6">
                <div>
                    <label class="block text-[12px] font-bold text-gray-600 mb-2 uppercase tracking-tight">회원 아이디 (ID)</label>
                    <input type="text" name="memberLoginId" placeholder="초대할 사용자의 아이디를 입력하세요"
                           class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none text-sm font-medium">
                </div>
                <div class="flex gap-3 pt-4 border-t border-gray-50">
                    <button type="button" onclick="closeInviteMemberModal()" class="flex-1 py-3 text-gray-400 font-bold text-sm">취소</button>
                    <button type="submit" class="flex-[2] py-3 bg-gray-900 hover:bg-black text-white font-bold rounded-xl shadow-lg transition-all text-sm">초대 보내기</button>
                </div>
            </form>
        </div>
    </div>

    <div id="kickMemberModal" class="hidden fixed inset-0 bg-black/50 backdrop-blur-sm z-[9999] flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-sm rounded-2xl shadow-2xl overflow-hidden animate-in zoom-in duration-300">
            <div class="p-8 text-center">
                <div class="w-16 h-16 bg-red-50 text-red-500 rounded-full flex items-center justify-center mx-auto mb-4">
                    <i class="fa-solid fa-user-minus text-2xl"></i>
                </div>
                <h3 class="text-lg font-bold text-gray-900 mb-2">멤버 내보내기</h3>
                <p class="text-sm text-gray-500 mb-6">정말 <span id="kickMemberName" class="font-bold text-gray-900 underline underline-offset-4"></span> 님을<br>그룹에서 내보내시겠습니까?</p>

                <div class="flex gap-3">
                    <button onclick="closeKickModal()" class="flex-1 py-3 bg-gray-100 hover:bg-gray-200 text-gray-600 font-bold rounded-xl transition-all text-sm">
                        취소
                    </button>
                    <button id="confirmKickBtn" class="flex-1 py-3 bg-red-500 hover:bg-red-600 text-white font-bold rounded-xl shadow-lg shadow-red-200 transition-all text-sm">
                        내보내기
                    </button>
                </div>
            </div>
        </div>
    </div>
    <div id="transferOwnershipModal" class="hidden fixed inset-0 bg-black/50 backdrop-blur-sm z-[9999] flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-sm rounded-2xl shadow-2xl overflow-hidden animate-in zoom-in duration-300 border border-gray-100">
            <div class="p-8 text-center">
                <div class="w-16 h-16 bg-indigo-50 text-indigo-600 rounded-full flex items-center justify-center mx-auto mb-4">
                    <i class="fa-solid fa-crown text-2xl"></i>
                </div>

                <h3 class="text-lg font-bold text-gray-900 mb-2">소유권 위임</h3>

                <p class="text-sm text-gray-500 mb-6">
                    <span id="targetOwnerName" class="font-bold text-indigo-600"></span> 님에게 그룹 소유권을 위임하시겠습니까?<br>
                    <span class="text-[11px] text-red-400 mt-2 block font-medium">* 위임 후 본인은 일반 멤버 권한으로 변경됩니다.</span>
                </p>

                <div class="flex gap-3">
                    <button onclick="closeTransferModal()" class="flex-1 py-3 bg-gray-100 hover:bg-gray-200 text-gray-600 font-bold rounded-xl transition-all text-sm">
                        취소
                    </button>
                    <button id="confirmTransferBtn" class="flex-1 py-3 bg-indigo-600 hover:bg-indigo-700 text-white font-bold rounded-xl shadow-lg shadow-indigo-100 transition-all text-sm">
                        위임하기
                    </button>
                </div>
            </div>
        </div>
    </div>
    <script src="/js/profile.js"></script>
    <script src="/js/group.js"></script>
</main>
</html>
