<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/base-layout}">
<main layout:fragment="content">
    <div class="max-w-7xl mx-auto p-6">
        <div class="flex flex-col md:flex-row gap-6">
            <th:block th:replace="~{fragments/profile-sidebar :: menu('group')}"></th:block>

            <div class="flex-1 flex flex-col gap-6">
                <th:block th:replace="~{fragments/profile-sidebar :: summary('info')}"></th:block>

                <section class="bg-white p-8 rounded-2xl shadow-sm border border-gray-200 min-h-[600px] flex flex-col">
                    <th:block th:replace="~{fragments/group-header :: header('schedules')}"></th:block>

                    <div class="grid grid-cols-1 lg:grid-cols-12 gap-8 animate-in fade-in slide-in-from-bottom-4 duration-500">

                        <div class="lg:col-span-4 space-y-6">
                            <div class="bg-indigo-600 rounded-3xl p-6 text-white shadow-xl shadow-indigo-100 relative overflow-hidden">
                                <div class="relative z-10">
                                    <p class="text-indigo-100 text-xs font-bold uppercase tracking-wider mb-1">Upcoming Events</p>
                                    <h3 class="text-2xl font-black mb-4">이번 달에는 <br><span id="month-total-count" class="text-white"></span>개의 일정이 있어요</h3>
                                    <button onclick="document.getElementById('event-modal').classList.remove('hidden'); document.getElementById('event-modal').classList.add('flex'); document.body.style.overflow='hidden';" class="px-4 py-2 bg-white/20 hover:bg-white/30 backdrop-blur-md rounded-xl text-xs font-bold transition-all flex items-center gap-2">
                                        <i class="fa-solid fa-plus"></i> 새 일정 등록
                                    </button>
                                </div>
                                <i class="fa-solid fa-calendar-check absolute -right-4 -bottom-4 text-8xl text-white/10 -rotate-12"></i>
                            </div>

                            <div id="selected-date-schedule-box" class="hidden bg-white rounded-3xl p-6 border-2 border-indigo-500/30 shadow-md animate-in slide-in-from-top-3 duration-300">
                                <h4 class="text-sm font-black text-indigo-600 mb-5 flex items-center justify-between">
                                    <span id="side-calendar-title"></span>
                                    <button type="button" onclick="document.getElementById('selected-date-schedule-box').classList.add('hidden')" class="text-gray-400 hover:text-black transition-colors">
                                        <i class="fa-solid fa-xmark text-xs"></i>
                                    </button>
                                </h4>
                                <div id="selected-date-schedule-list" class="space-y-4">
                                </div>
                            </div>

                            <div class="bg-white rounded-3xl p-6 border border-gray-100 shadow-sm">
                                <h4 class="text-sm font-bold text-gray-900 mb-5 flex items-center justify-between">
                                    다가오는 일정
                                </h4>

                                <div id="upcoming-schedule-list" class="space-y-4">
                                </div>
                            </div>
                        </div>

                        <div class="lg:col-span-8">
                            <div class="bg-white rounded-3xl border border-gray-100 shadow-sm overflow-hidden">
                                <div class="p-6 border-b border-gray-50 flex items-center justify-between bg-white/50 backdrop-blur-sm sticky top-0 z-10">
                                    <div class="flex items-center gap-4">
                                        <h3 class="text-xl font-black text-gray-900"></h3>
                                        <div class="flex items-center bg-gray-100 rounded-lg p-1">
                                            <button class="w-8 h-8 flex items-center justify-center hover:bg-white rounded-md transition-all text-gray-500"><i class="fa-solid fa-chevron-left text-xs"></i></button>
                                            <button class="w-8 h-8 flex items-center justify-center hover:bg-white rounded-md transition-all text-gray-500"><i class="fa-solid fa-chevron-right text-xs"></i></button>
                                        </div>
                                    </div>
                                    <div class="flex items-center gap-2">
                                        <button class="px-4 py-2 bg-gray-900 text-white text-xs font-bold rounded-xl shadow-lg shadow-gray-200">Today</button>
                                    </div>
                                </div>

                                <div class="p-6 bg-white">
                                    <div class="grid grid-cols-7 mb-4 border-b border-gray-50 pb-3">
                                        <div class="text-center text-[11px] font-black text-red-400 uppercase tracking-widest">일</div>
                                        <div class="text-center text-[11px] font-black text-gray-400 uppercase tracking-widest">월</div>
                                        <div class="text-center text-[11px] font-black text-gray-400 uppercase tracking-widest">화</div>
                                        <div class="text-center text-[11px] font-black text-gray-400 uppercase tracking-widest">수</div>
                                        <div class="text-center text-[11px] font-black text-gray-400 uppercase tracking-widest">목</div>
                                        <div class="text-center text-[11px] font-black text-gray-400 uppercase tracking-widest">금</div>
                                        <div class="text-center text-[11px] font-black text-blue-400 uppercase tracking-widest">토</div>
                                    </div>

                                    <div id="calendar-view" class="grid grid-cols-7 gap-px bg-gray-100 border border-gray-100 rounded-2xl overflow-hidden shadow-inner">
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </section>
            </div>
        </div>
    </div>

    <div id="inviteMemberModal" class="hidden fixed inset-0 bg-black/50 backdrop-blur-sm z-[9999] flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-md rounded-2xl shadow-2xl overflow-hidden animate-in zoom-in duration-300">
            <div class="px-8 py-6 bg-gray-50 border-b border-gray-100 flex justify-between items-center">
                <h3 class="text-lg font-bold text-gray-900">멤버 초대하기</h3>
                <button onclick="closeInviteMemberModal()" class="text-gray-400 hover:text-black">
                    <i class="fa-solid fa-xmark text-lg"></i>
                </button>
            </div>
            <form id="inviteMemberForm" class="p-8 space-y-6">
                <div>
                    <label class="block text-[12px] font-bold text-gray-600 mb-2 uppercase tracking-tight">회원 아이디 (ID)</label>
                    <input type="text" name="memberLoginId" placeholder="초대할 사용자의 아이디를 입력하세요"
                           class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none text-sm font-medium">
                </div>
                <div class="flex gap-3 pt-4 border-t border-gray-50">
                    <button type="button" onclick="closeInviteMemberModal()" class="flex-1 py-3 text-gray-400 font-bold text-sm">취소</button>
                    <button type="submit" class="flex-[2] py-3 bg-gray-900 hover:bg-black text-white font-bold rounded-xl shadow-lg transition-all text-sm">초대 보내기</button>
                </div>
            </form>
        </div>
    </div>

    <div id="event-modal" class="hidden fixed inset-0 bg-black/50 backdrop-blur-sm z-[9999] flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-lg rounded-[2rem] shadow-2xl border border-gray-100 animate-in fade-in zoom-in duration-300 flex flex-col max-h-[90vh] overflow-hidden">
            <div class="px-8 py-6 bg-gray-50/50 border-b border-gray-100 flex items-center justify-between shrink-0">
                <div>
                    <h3 id="modal-mode-title" class="text-xl font-bold text-gray-900">새로운 일정 추가</h3>
                    <p id="modal-mode-desc" class="text-[11px] text-gray-400 mt-1 font-medium tracking-tight">멋진 하루를 계획해 보세요!</p>
                </div>
                <button onclick="closeAddEventModal()" class="text-gray-400 hover:text-black transition-colors">
                    <i class="fa-solid fa-xmark text-xl"></i>
                </button>
            </div>
            <form id="event-form" class="p-8 overflow-y-auto custom-scrollbar flex-1">
                <div id="modal-target-type-container" class="hidden">
                    <input type="hidden" id="targetType" value="GROUP">
                    <input type="hidden" id="groupId" th:value="${group.id}">
                </div>
                <div class="mb-5 p-4 bg-indigo-50/50 border border-indigo-100 rounded-2xl flex items-center gap-2.5 animate-in fade-in duration-200">
                    <i class="fa-solid fa-users text-xs text-indigo-500"></i>
                    <span class="text-xs font-bold text-gray-600 shrink-0">소속 그룹 :</span>
                    <span th:text="${group.name}" class="text-xs font-black text-indigo-700"></span>
                </div>

                <div id="edit-mode-header" class="hidden p-4 bg-gray-50 border border-gray-100 rounded-2xl flex items-center gap-2 animate-in fade-in duration-200">
                    <i id="edit-mode-icon" class="fa-solid text-xs"></i>
                    <span id="edit-mode-label" class="text-xs font-bold shrink-0"></span>
                    <span id="edit-mode-value" class="text-xs font-black"></span>
                </div>
                <div>
                    <label class="block text-[12px] font-bold text-gray-600 mb-2 ml-1 tracking-tight">일정명</label>
                    <input type="text" name="title" id="form-title" required placeholder="예: 프로젝트 기획 회의" class="w-full px-4 py-3.5 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-black focus:bg-white focus:border-black outline-none transition-all text-sm font-medium">
                </div>
                <div class="mt-6">
                    <label class="block text-[12px] font-bold text-gray-600 mb-2 ml-1 tracking-tight">일정 내용</label>
                    <textarea rows="4" name="content" id="form-content" placeholder="내용을 입력하세요." class="w-full px-4 py-3.5 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-black focus:bg-white focus:border-black outline-none transition-all text-sm resize-none min-h-[120px]"></textarea>
                </div>
                <div class="mt-6">
                    <label class="block text-[12px] font-bold text-gray-600 mb-2 ml-1 tracking-tight">장소</label>
                    <div class="relative">
                        <i class="fa-solid fa-location-dot absolute left-4 top-1/2 -translate-y-1/2 text-gray-300 text-sm"></i>
                        <input type="text" name="location" id="form-location" placeholder="어디서 진행되나요?" class="w-full pl-11 pr-4 py-3.5 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-black focus:bg-white focus:border-black outline-none transition-all text-sm placeholder:text-gray-300 font-medium">
                    </div>
                </div>
                <div class="space-y-5 mt-6">
                    <div>
                        <label class="block text-[12px] font-bold text-gray-600 mb-2 ml-1 tracking-tight">시작 일시</label>
                        <div class="flex gap-2 w-full">
                            <input type="date" id="startDate" class="flex-[1.5] min-w-0 px-4 py-3.5 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-black focus:bg-white focus:border-black outline-none transition-all text-sm font-medium text-gray-700">
                            <input type="time" id="startTime" class="flex-1 min-w-0 px-4 py-3.5 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-black focus:bg-white focus:border-black outline-none transition-all text-sm font-medium text-gray-700">
                        </div>
                    </div>
                    <div>
                        <label class="block text-[12px] font-bold text-gray-600 mb-2 ml-1 tracking-tight">종료 일시</label>
                        <div class="flex gap-2 w-full">
                            <input type="date" id="endDate" required class="flex-[1.5] min-w-0 px-4 py-3.5 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-black focus:bg-white focus:border-black outline-none transition-all text-sm font-medium text-gray-700">
                            <input type="time" id="endTime" class="flex-1 min-w-0 px-4 py-3.5 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-black focus:bg-white focus:border-black outline-none transition-all text-sm font-medium text-gray-700">
                        </div>
                    </div>
                </div>
                <div class="mt-6">
                    <label class="block text-[12px] font-bold text-gray-600 mb-3 ml-1 tracking-tight">배경색 선택</label>
                    <div class="flex gap-4 px-1">
                        <label class="relative cursor-pointer">
                            <input type="radio" name="color" value="bg-gray-800" class="peer sr-only">
                            <div class="w-8 h-8 rounded-full bg-gray-800 peer-checked:ring-offset-2 peer-checked:ring-2 peer-checked:ring-gray-800 transition-all"></div>
                        </label>
                        <label class="relative cursor-pointer">
                            <input type="radio" name="color" value="bg-indigo-500" class="peer sr-only">
                            <div class="w-8 h-8 rounded-full bg-indigo-500 peer-checked:ring-offset-2 peer-checked:ring-2 peer-checked:ring-indigo-500 transition-all"></div>
                        </label>
                        <label class="relative cursor-pointer">
                            <input type="radio" name="color" value="bg-rose-500" class="peer sr-only">
                            <div class="w-8 h-8 rounded-full bg-rose-500 peer-checked:ring-offset-2 peer-checked:ring-2 peer-checked:ring-rose-500 transition-all"></div>
                        </label>
                        <label class="relative cursor-pointer">
                            <input type="radio" name="color" value="bg-emerald-500" class="peer sr-only">
                            <div class="w-8 h-8 rounded-full bg-emerald-500 peer-checked:ring-offset-2 peer-checked:ring-2 peer-checked:ring-emerald-500 transition-all"></div>
                        </label>
                    </div>
                </div>
                <div id="modal-status-checkbox-container" class="hidden border-t border-gray-100 pt-5 mt-6">
                    <div class="flex items-center gap-3 px-1">
                        <label class="text-[12px] font-bold text-gray-600 tracking-tight shrink-0 min-w-[70px]">진행 상태</label>
                        <label class="inline-flex items-center gap-2 cursor-pointer group select-none">
                            <input type="checkbox" name="isCompleted" id="form-isCompleted" class="rounded-lg border-gray-200 text-indigo-600 focus:ring-black w-4 h-4 transition-all cursor-pointer">
                            <span class="text-xs font-medium text-gray-950 tracking-tight group-hover:text-indigo-600 transition-colors">완료</span>
                        </label>
                    </div>
                </div>
            </form>
            <div class="p-8 bg-white border-t border-gray-100 shrink-0">
                <div class="flex items-center gap-3">
                    <button type="button" onclick="closeAddEventModal()" class="flex-1 py-3.5 border border-gray-200 text-gray-500 font-bold rounded-xl hover:bg-gray-50 transition-all text-sm">취소</button>
                    <button type="submit" form="event-form" class="flex-[2] py-3.5 bg-gray-900 text-white font-bold rounded-xl hover:bg-black shadow-lg shadow-gray-200 transition-all text-sm">
                        <span id="submit-btn-text">일정 저장하기</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div id="detail-event-modal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-md z-[9999] items-center justify-center p-4 animate-in fade-in duration-300">
        <div class="bg-white w-full max-w-xl rounded-[2rem] shadow-2xl border border-gray-100 overflow-hidden flex flex-col max-h-[90vh]">
            <div class="px-8 py-6 bg-gray-50/50 border-b border-gray-100 flex items-center justify-between shrink-0">
                <div class="space-y-1 flex-1 pr-6">
                    <div class="flex items-center gap-4">
                        <span id="detail-targetType" class="inline-flex items-center gap-1 text-[10px] font-black text-indigo-600 bg-indigo-50 px-3 py-1 rounded-full uppercase tracking-tighter"></span>
                        <span id="detail-groupName" class="hidden"><span id="detail-groupName-text"></span></span>
                    </div>
                    <h3 id="detail-title" class="text-xl font-bold text-gray-900 tracking-tight leading-tight"></h3>
                </div>
                <button onclick="closeDetailEventModal()" class="text-gray-400 hover:text-black transition-colors">
                    <i class="fa-solid fa-xmark text-xl"></i>
                </button>
            </div>
            <div class="p-8 space-y-6 overflow-y-auto custom-scrollbar flex-1">
                <div id="detail-group-item" class="hidden">
                    <div class="flex items-center gap-3 px-1">
                        <label class="text-[12px] font-bold text-gray-600 tracking-tight shrink-0 min-w-[70px]">소속 그룹</label>
                        <div class="flex items-center gap-2 text-xs font-semibold text-gray-700 tracking-tight flex-1">
                            <i class="fa-solid fa-users text-[13px] text-indigo-400 w-5 text-center shrink-0"></i>
                            <span id="detail-group-name" class="font-bold"></span>
                        </div>
                    </div>
                </div>
                <div>
                    <div class="flex items-center gap-3 px-1">
                        <label class="text-[12px] font-bold text-gray-600 tracking-tight shrink-0 min-w-[70px]">작성자</label>
                        <div class="flex items-center gap-1.5 text-xs font-medium text-gray-700 tracking-tight flex-1">
                            <i class="fa-solid fa-user text-[11px] w-4 text-center text-gray-400"></i>
                            <span id="detail-creator-name" class="font-bold"></span>
                        </div>
                    </div>
                </div>
                <div>
                    <div class="flex items-baseline gap-3 px-1">
                        <label class="text-[12px] font-bold text-gray-600 tracking-tight shrink-0 min-w-[70px]">기간</label>
                        <div class="flex items-center gap-1.5 text-xs font-bold text-indigo-600 tracking-tight">
                            <i class="fa-solid fa-calendar-check text-[11px] w-4 text-center"></i>
                            <span id="detail-datetime"></span>
                        </div>
                    </div>
                </div>
                <div>
                    <div class="flex items-baseline gap-3 px-1">
                        <label class="text-[12px] font-bold text-gray-600 tracking-tight shrink-0 min-w-[70px]">장소</label>
                        <div class="flex items-center gap-1.5 text-xs font-medium text-indigo-400 tracking-tight">
                            <i class="fa-solid fa-location-dot text-[11px] w-4 text-center"></i>
                            <span id="detail-location"></span>
                        </div>
                    </div>
                </div>
                <div>
                    <div class="flex items-baseline gap-3 px-1">
                        <label class="text-[12px] font-bold text-gray-600 tracking-tight shrink-0 min-w-[70px]">일정 내용</label>
                        <div class="flex items-center gap-1.5 text-xs font-medium text-gray-950 tracking-tight flex-1">
                            <i class="fa-solid fa-align-left text-[11px] w-4 text-center text-gray-400 self-center"></i>
                            <div id="detail-content" class="whitespace-pre-wrap leading-relaxed flex-1"></div>
                        </div>
                    </div>
                </div>
                <div>
                    <div class="flex items-center gap-3 px-1">
                        <label class="text-[12px] font-bold text-gray-600 tracking-tight shrink-0 min-w-[70px]">진행 상태</label>
                        <div class="flex items-center gap-1.5 flex-1">
                            <i id="detail-status-uncheck" class="hidden fa-regular fa-square text-[11px] text-gray-300 w-4 text-center"></i>
                            <i id="detail-status-checked" class="hidden fa-solid fa-square-check text-[11px] text-indigo-500 w-4 text-center"></i>
                            <span id="detail-status-text" class="text-xs font-medium text-gray-950 tracking-tight"></span>
                        </div>
                    </div>
                </div>

                <div id="detail-comment-section" class="border-t border-gray-100 pt-6 space-y-4 hidden">
                    <div class="flex items-center justify-between ml-1">
                        <label class="block text-[12px] font-bold text-gray-600 tracking-tight">
                            댓글 <span id="detail-comment-count" class="text-indigo-600 font-bold"></span>
                        </label>
                    </div>
                    <div id="detail-comment-list" class="space-y-4"></div>

                    <div id="comment-empty-state" class="hidden py-8 px-4 text-center flex flex-col items-center justify-center animate-in fade-in zoom-in-95 duration-200 border border-dashed border-gray-200 rounded-[1.5rem] relative overflow-hidden bg-gray-50/30">
                        <div class="w-10 h-10 bg-white rounded-full flex items-center justify-center text-gray-300 mb-2 border border-gray-100 shadow-inner">
                            <i class="fa-regular fa-comments text-base"></i>
                        </div>
                        <h5 class="text-[11px] font-bold text-gray-400">아직 등록된 댓글이 없습니다</h5>
                        <p class="text-[10px] text-gray-400/70 mt-0.5 font-medium tracking-tight">이 일정에 대한 첫 번째 의견을 남겨보세요!</p>
                    </div>

                    <div id="comment-write-container" class="relative group mt-4">
                        <input type="text" id="comment-input" placeholder="댓글을 입력하세요..." class="w-full pl-5 pr-20 py-3.5 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-black focus:bg-white focus:border-black outline-none transition-all text-sm font-medium tracking-tight">
                        <button type="button" id="btn-comment-submit" class="absolute right-2 top-2 bottom-2 px-5 bg-gray-900 text-white text-[11px] font-black rounded-xl hover:bg-black transition-all">등록</button>
                    </div>
                </div>
            </div>
            <div class="p-8 bg-white border-t border-gray-100 shrink-0 flex items-center gap-3">
                <button type="button" onclick="openDeleteScheduleModal()" class="flex-1 py-3.5 border border-gray-200 text-rose-500 hover:bg-rose-50 font-bold rounded-xl transition-all text-sm">삭제</button>
                <button type="button" onclick="handleGroupEditTrigger()" class="flex-[2] py-3.5 bg-gray-900 text-white font-bold rounded-xl hover:bg-black shadow-lg shadow-gray-200 transition-all text-sm">수정하기</button>
            </div>
        </div>
    </div>

    <div id="deleteScheduleConfirmModal" class="hidden fixed inset-0 bg-black/50 backdrop-blur-sm z-[9999] flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-sm rounded-[2rem] shadow-2xl border border-gray-100 animate-in fade-in zoom-in duration-200 overflow-hidden">
            <div class="p-6 text-center space-y-3 pt-8">
                <div class="w-12 h-12 rounded-full bg-rose-50 text-rose-500 flex items-center justify-center mx-auto text-lg"><i class="fa-solid fa-calendar-xmark"></i></div>
                <h4 class="text-base font-bold text-gray-900">일정 삭제 확인</h4>
                <p class="text-xs text-gray-400 font-medium px-2">정말로 이 일정을 삭제하시겠습니까?</p>
            </div>
            <div class="p-4 bg-slate-50 border-t border-gray-100 flex items-center gap-2">
                <button type="button" onclick="closeDeleteScheduleModal()" class="flex-1 py-2.5 bg-white border border-gray-200 text-gray-500 font-bold rounded-xl text-xs">취소</button>
                <button type="button" onclick="executeScheduleDelete()" class="flex-1 py-2.5 bg-rose-500 text-white font-bold rounded-xl text-xs">삭제하기</button>
            </div>
        </div>
    </div>

    <div id="deleteCommentConfirmModal" class="hidden fixed inset-0 bg-black/50 backdrop-blur-sm z-[9999] flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-sm rounded-[2rem] shadow-2xl border border-gray-100 animate-in fade-in zoom-in duration-200 overflow-hidden">
            <div class="p-6 text-center space-y-3 pt-8">
                <div class="w-12 h-12 rounded-full bg-rose-50 text-rose-500 flex items-center justify-center mx-auto text-lg"><i class="fa-solid fa-trash-can"></i></div>
                <h4 class="text-base font-bold text-gray-900">댓글 삭제 확인</h4>
                <p class="text-xs text-gray-400 font-medium px-2">정말로 이 댓글을 삭제하시겠습니까?</p>
            </div>
            <div class="p-4 bg-slate-50 border-t border-gray-100 flex items-center gap-2">
