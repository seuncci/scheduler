<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/base-layout}">
<main layout:fragment="content">
  <div id="toast"
       class="fixed top-[-100px] left-1/2 -translate-x-1/2 z-[10000] w-full max-w-sm transition-all duration-500 ease-in-out">
    <div id="toast-container" class="mx-4 px-4 py-3 rounded-lg shadow-md flex items-center justify-center gap-2 border bg-white">
      <i id="toast-icon" class="fa-solid"></i>
      <span id="toast-message" class="font-medium text-sm text-center"></span>
    </div>
  </div>
  <div class="max-w-7xl mx-auto p-6">

    <div class="flex flex-col md:flex-row gap-6">

      <th:block th:replace="~{fragments/profile-sidebar :: menu('group')}"></th:block>


      <div class="flex-1 flex flex-col gap-6">

        <th:block th:replace="~{fragments/profile-sidebar :: summary('info')}"></th:block>
        <section class="bg-white p-8 rounded-2xl shadow-sm border border-gray-200 min-h-[600px] flex flex-col">

          <th:block th:replace="~{fragments/group-header :: header('invitation')}"></th:block>

          <div id="content-invite" class="tab-pane animate-in fade-in duration-500">

            <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-8">
              <div>
                <h4 class="text-sm font-bold text-gray-800 flex items-center gap-2">
                  초대 링크 목록
                  <span class="px-2 py-0.5 bg-gray-100 text-gray-500 text-[10px] rounded-full font-bold" th:text="|${links.currentCount}/${links.maxCount} 사용 중|"
                        ></span>
                </h4>
                <p class="text-[11px] text-gray-400 mt-1 font-medium">생성된 링크를 통해 외부 사용자를 그룹으로 초대할 수 있습니다.</p>
              </div>

              <button onclick="openCreateLinkModal()"
                      th:disabled="${links.currentCount >= links.maxCount}"
                      th:title="${links.currentCount >= links.maxCount} ? |최대 ${links.maxCount}개까지만 생성 가능합니다.| : ''"
                      th:classappend="${links.currentCount >= links.maxCount} ? 'opacity-50 cursor-not-allowed' : ''"
                      class="px-4 py-2.5 bg-gray-900 text-white text-xs font-bold rounded-xl hover:bg-black transition-all shadow-md flex items-center gap-2 shrink-0">
                <i class="fa-solid fa-plus text-[10px]"></i> 새 초대 링크 생성
              </button>
            </div>

            <div class="overflow-x-auto border border-gray-100 rounded-2xl shadow-sm bg-white">
              <table class="w-full text-left border-collapse">
                <thead>
                <tr class="border-b border-gray-100 bg-gray-50/30">
                  <th class="px-6 py-4 text-[12px] font-bold text-gray-700 uppercase tracking-tight">초대 코드 / URL</th>
                  <th class="px-6 py-4 text-[12px] font-bold text-gray-700 uppercase tracking-tight text-center">유효 기간</th>
                  <th class="px-6 py-4 text-[12px] font-bold text-gray-700 uppercase tracking-tight text-center">관리</th>
                </tr>
                </thead>
                <tbody class="divide-y divide-gray-50">
                <tr th:if="${#lists.isEmpty(links.links)}">
                  <td colspan="3" class="py-20 text-center">
                    <div class="flex flex-col items-center justify-center">
                      <i class="fa-solid fa-link-slash text-3xl text-gray-200 mb-3"></i>
                      <p class="text-sm text-gray-400">생성된 초대 링크가 없습니다.</p>
                    </div>
                  </td>
                </tr>

                <tr th:unless="${#lists.isEmpty(links.links)}" th:each="link : ${links.links}" class="hover:bg-gray-50/30 transition-colors">
                  <td class="px-6 py-5">
                    <div class="flex items-center gap-3">
                <span class="font-mono font-bold text-indigo-600 bg-indigo-50 px-2.5 py-1 rounded text-sm tracking-tighter shadow-sm"
                      th:text="${link.code}"></span>

                      <button onclick="copyLink(this)"
                              th:data-code="${link.code}"
                              class="w-8 h-8 inline-flex items-center justify-center text-gray-400 hover:text-indigo-600 hover:bg-indigo-50 rounded-lg transition-all">
                        <i class="fa-regular fa-copy"></i>
                      </button>

                      <span class="text-[11px] text-gray-400 font-medium truncate hidden lg:inline"
                            th:text="|/groups/join?code=${link.code}|"></span>
                    </div>
                  </td>

                  <td class="px-6 py-5 text-center font-bold text-gray-600">
                    <div class="flex flex-col items-center">
                      <span class="text-sm" th:text="${#temporals.format(link.expireDate, 'yyyy.MM.dd')}"></span>
                    </div>
                  </td>

                  <td class="px-6 py-5 text-center">
                    <button onclick="openDeleteLinkModal(this)"
                            th:data-link-id="${link.id}"
                            th:data-group-id="${group.id}"
                            class="px-4 py-1.5 text-red-400 hover:text-red-600 hover:bg-red-50 rounded-lg text-xs font-bold transition-all border border-transparent hover:border-red-100">
                      삭제
                    </button>
                  </td>
                </tr>
                </tbody>
              </table>
            </div>
          </div>

        </section>


      </div>
    </div>
  </div>
  <div id="createLinkModal" class="hidden fixed inset-0 bg-black/50 backdrop-blur-sm z-[9999] flex items-center justify-center p-4">
    <div class="bg-white w-full max-w-md rounded-2xl shadow-2xl overflow-hidden animate-in zoom-in duration-300">
      <div class="px-8 py-6 bg-gray-50 border-b border-gray-100 flex justify-between items-center">
        <h3 class="text-lg font-bold text-gray-900">새 초대 링크 생성</h3>
        <button onclick="closeCreateLinkModal()" class="text-gray-400 hover:text-black"><i class="fa-solid fa-xmark text-lg"></i></button>
      </div>
      <form id="createLinkForm" class="p-8 space-y-6">
        <div>
          <label class="block text-[12px] font-bold text-gray-600 mb-2 uppercase tracking-tight">링크 유효 기간</label>
          <select name="duration" class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none text-sm font-bold">
            <option value="1">1일 (오늘 하루)</option>
            <option value="7" selected>7일 (1주일)</option>
            <option value="30">30일 (1개월)</option>
          </select>
        </div>
        <div class="flex gap-3 pt-4">
          <button type="button" onclick="closeCreateLinkModal()" class="flex-1 py-3 text-gray-400 font-bold text-sm">취소</button>
          <button type="submit" class="flex-[2] py-3 bg-gray-900 hover:bg-black text-white font-bold rounded-xl shadow-lg transition-all text-sm">링크 발급하기</button>
        </div>
      </form>
    </div>
  </div>
  <div id="deleteLinkConfirmModal" class="hidden fixed inset-0 bg-black/50 backdrop-blur-sm z-[9999] flex items-center justify-center p-4">
    <div class="bg-white w-full max-w-sm rounded-2xl shadow-2xl overflow-hidden animate-in zoom-in duration-300">
      <div class="p-8 text-center">
        <div class="w-16 h-16 bg-red-50 text-red-500 rounded-full flex items-center justify-center mx-auto mb-4">
          <i class="fa-solid fa-trash-can text-2xl"></i>
        </div>
        <h3 class="text-lg font-bold text-gray-900 mb-2">초대 링크 삭제</h3>
        <p class="text-sm text-gray-500 mb-6">정말 이 링크를 삭제하시겠습니까?<br>삭제 후에는 이 코드로 그룹에 가입할 수 없습니다.</p>

        <div class="flex gap-3">
          <button onclick="closeDeleteLinkModal()" class="flex-1 py-3 bg-gray-100 hover:bg-gray-200 text-gray-600 font-bold rounded-xl transition-all text-sm">
            취소
          </button>
          <button id="confirmDeleteLinkBtn" class="flex-1 py-3 bg-red-500 hover:bg-red-600 text-white font-bold rounded-xl shadow-lg shadow-red-200 transition-all text-sm">
            삭제하기
          </button>
        </div>
      </div>
    </div>
  </div>
  <script src="/js/profile.js"></script>
  <script src="/js/group.js"></script>
</main>

</html>
