<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <style>
        body { font-family: "Pretendard", sans-serif; }
    </style>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen py-10">
<div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-md border border-gray-200 flex flex-col">

    <div class="text-center mb-8">
        <h1 class="text-3xl font-bold text-gray-700">회원가입</h1>
        <p class="text-gray-400 text-sm mt-2">서비스 이용을 위해 정보를 입력해주세요.</p>
    </div>

    <form th:action="@{/members/signup}" method="post" class="space-y-4">
        <div class="relative">
                <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400">
                    <i class="fa-solid fa-user"></i>
                </span>
            <input type="text" name="username" placeholder="아이디를 입력하세요" required
                   class="w-full pl-10 pr-4 py-2 border border-gray-300 rounded-md placeholder:text-sm focus:outline-none focus:ring-2 focus:ring-blue-400">
        </div>

        <div class="relative">
            <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400">
                <i class="fa-solid fa-lock"></i>
            </span>
            <input type="password" name="password" placeholder="비밀번호를 입력하세요" required
                   class="w-full pl-10 pr-10 py-2 border border-gray-300 rounded-md placeholder:text-sm focus:outline-none focus:ring-2 focus:ring-blue-400">
        </div>

        <div class="relative">
            <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400">
                <i class="fa-solid fa-circle-check"></i>
            </span>
            <input type="password" name="passwordConfirm" placeholder="비밀번호를 한 번 더 입력하세요" required
                   class="w-full pl-10 pr-10 py-2 border border-gray-300 rounded-md placeholder:text-sm focus:outline-none focus:ring-2 focus:ring-blue-400">
        </div>

        <div class="relative">
            <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400">
                <i class="fa-solid fa-signature"></i>
            </span>
            <input type="text" name="name" placeholder="이름을 입력하세요" required
                   class="w-full pl-10 pr-4 py-2 border border-gray-300 rounded-md placeholder:text-sm focus:outline-none focus:ring-2 focus:ring-blue-400">
        </div>

        <div class="relative">
            <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400">
                <i class="fa-solid fa-envelope"></i>
            </span>
            <input type="email" name="email" placeholder="이메일을 입력하세요" required
                   class="w-full pl-10 pr-4 py-2 border border-gray-300 rounded-md placeholder:text-sm focus:outline-none focus:ring-2 focus:ring-blue-400">
        </div>

        <button type="submit"
                class="w-full bg-gray-600 hover:bg-black text-white font-bold py-3 rounded-md shadow-md transition-all duration-200 mt-2">
            회원가입
        </button>
    </form>
</div>
</body>
</html>
