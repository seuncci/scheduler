<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/base-layout}">

<main layout:fragment="content" class="flex items-center justify-center min-h-[calc(100vh-80px)]">
<div id="toast"
     class="fixed top-[-100px] left-1/2 -translate-x-1/2 z-50 w-full max-w-sm transition-all duration-500 ease-in-out">
    <div id="toast-container" class="mx-4 px-4 py-3 rounded-lg shadow-md flex items-center justify-center gap-2 border">
        <i id="toast-icon" class="fa-solid"></i>
        <span id="toast-message" class="font-medium text-sm text-center"></span>
    </div>
</div>
<div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-md border border-gray-200 flex flex-col">

    <div class="text-center mb-8">
        <h1 class="text-3xl font-bold text-gray-700">회원가입</h1>
        <p class="text-gray-400 text-sm mt-2">서비스 이용을 위해 정보를 입력해주세요.</p>
    </div>

    <form th:action="@{/api/members/signup}" method="post" class="space-y-4" id="signupForm">
        <div class="relative">
                <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400">
                    <i class="fa-solid fa-user"></i>
                </span>
            <input type="text" name="memberId" placeholder="아이디를 입력하세요" required
                   class="w-full pl-10 pr-4 py-2 border border-gray-300 rounded-md placeholder:text-sm focus:outline-none focus:ring-2 focus:ring-blue-400">
        </div>

        <div class="relative">
            <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400">
                <i class="fa-solid fa-lock"></i>
            </span>
            <input type="password" name="password" placeholder="비밀번호를 입력하세요" required
                   class="w-full pl-10 pr-10 py-2 border border-gray-300 rounded-md placeholder:text-sm focus:outline-none focus:ring-2 focus:ring-blue-400">
        </div>

        <div class="relative">
            <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400">
                <i class="fa-solid fa-circle-check"></i>
            </span>
            <input type="password" name="passwordConfirm" placeholder="비밀번호를 한 번 더 입력하세요" required
                   class="w-full pl-10 pr-10 py-2 border border-gray-300 rounded-md placeholder:text-sm focus:outline-none focus:ring-2 focus:ring-blue-400">
        </div>

        <div class="relative">
            <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400">
                <i class="fa-solid fa-signature"></i>
            </span>
            <input type="text" name="name" placeholder="이름을 입력하세요" required
                   class="w-full pl-10 pr-4 py-2 border border-gray-300 rounded-md placeholder:text-sm focus:outline-none focus:ring-2 focus:ring-blue-400">
        </div>

        <div class="relative">
            <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400">
                <i class="fa-solid fa-envelope"></i>
            </span>
            <input type="email" name="email" placeholder="이메일을 입력하세요" required
                   class="w-full pl-10 pr-4 py-2 border border-gray-300 rounded-md placeholder:text-sm focus:outline-none focus:ring-2 focus:ring-blue-400">
        </div>

        <button type="submit"
                class="w-full bg-gray-600 hover:bg-black text-white font-bold py-3 rounded-md shadow-md transition-all duration-200 mt-2">
            회원가입
        </button>
    </form>
</div>
<script src="/js/profile.js"></script>

<script>

document.getElementById('signupForm').addEventListener('submit', async function(e) {
    
    e.preventDefault();
    
    const form = e.target;
    const submitBtn = form.querySelector('button[type="submit"]');
    
    const formData = new FormData(form);
    const data = Object.fromEntries(formData.entries());

    if (data.password !== data.passwordConfirm) {

        showToast('error', '비밀번호가 일치하지 않습니다.');
        return;
    }

    try {
        submitBtn.disabled = true;

        const response = await fetch('/api/members/signup', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        });

        const result = await response.json();

        if (result.code === 2002) {

            showToast('success', result.message);

            setTimeout(() => {
                location.href = "/members/login";
            }, 2000);
        } else {
            showToast('error', result.message);
        }
        
    } catch (error) {
        console.error("Network Error:", error);
        alert("서버 통신 오류가 발생했습니다.");
    } finally {
        submitBtn.disabled = false;
    }

});
</script>
</main>
</html>
