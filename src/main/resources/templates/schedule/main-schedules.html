<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/base-layout}">
<main layout:fragment="content">
  <div class="max-w-7xl mx-auto p-6">
    <div class="flex flex-col lg:flex-row gap-8">

      <!-- [좌측] 사이드 일정바 -->
      <div class="lg:w-80 shrink-0 space-y-6">
        <div class="bg-indigo-600 rounded-3xl p-6 text-white shadow-xl shadow-indigo-100 relative overflow-hidden">
          <div class="relative z-10">
            <h3 th:text="|안녕하세요, ${#authentication.principal.name}님!|" class="text-xl font-black mb-1">
              </h3>
            <p class="text-indigo-100 text-xs font-medium leading-relaxed">오늘 예정된 일정은 총 <span class="text-white font-bold underline">4건</span>입니다.</p>
          </div>
          <i class="fa-solid fa-bolt absolute -right-2 -bottom-2 text-6xl text-white/10 -rotate-12"></i>
        </div>

        <div class="bg-white rounded-3xl p-6 border border-gray-100 shadow-sm">
          <h4 class="text-sm font-bold text-gray-900 mb-5 flex items-center gap-2">
            <i class="fa-solid fa-thumbtack text-indigo-500"></i> 메모
          </h4>
          <div class="space-y-3">
            <div class="p-4 bg-amber-50/50 border border-amber-100 rounded-2xl cursor-pointer hover:shadow-md transition-all">
              <p class="text-xs font-bold text-amber-800">그룹 로고 시안 확정하기</p>
              <p class="text-[10px] text-amber-600/70 mt-1 font-medium">디자인그룹</p>
            </div>
            <div class="p-4 bg-indigo-50/50 border border-indigo-100 rounded-2xl cursor-grab">
              <p class="text-xs font-bold text-indigo-800">포트폴리오 내용 정리</p>
              <p class="text-[10px] text-indigo-600/70 mt-1 font-medium">개인공부</p>
            </div>
          </div>
        </div>
      </div>

      <div class="flex-1 flex flex-col gap-6">
        <section class="bg-white p-4 md:p-8 rounded-3xl shadow-sm border border-gray-200 min-h-[800px] flex flex-col">

          <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-6 mb-8 pb-6 border-b border-gray-50">
            <div class="flex items-center gap-4">
              <h2 class="text-xl md:text-2xl font-black text-gray-900 tracking-tight"></h2>
              <div class="flex p-1 bg-gray-100 rounded-xl border border-gray-200/50">
                <button id="btn-monthly" class="tab-btn px-4 py-1.5 text-[11px] font-bold rounded-lg bg-white shadow-sm text-indigo-600 transition-all">월간</button>
                <button id="btn-weekly" class="tab-btn px-4 py-1.5 text-[11px] font-bold text-gray-400 hover:text-gray-600 transition-all">주간</button>
              </div>
            </div>

            <div class="flex items-center gap-3">
              <div class="flex items-center bg-gray-50 rounded-xl p-1 border border-gray-100">
                <button class="w-8 h-8 flex items-center justify-center hover:bg-white hover:shadow-sm rounded-lg text-gray-500 transition-all"><i class="fa-solid fa-chevron-left text-[10px]"></i></button>
                <button class="px-3 text-[11px] font-bold text-gray-700 hover:text-indigo-600 transition-colors">오늘</button>
                <button class="w-8 h-8 flex items-center justify-center hover:bg-white hover:shadow-sm rounded-lg text-gray-500 transition-all"><i class="fa-solid fa-chevron-right text-[10px]"></i></button>
              </div>

              <button onclick="openAddEventModal()" class="px-4 py-2.5 bg-gray-900 text-white text-xs font-bold rounded-xl hover:bg-black shadow-lg shadow-gray-200 flex items-center gap-2 transition-all active:scale-95">
                <i class="fa-solid fa-plus text-[10px]"></i> 일정 추가
              </button>
            </div>
          </div>

          <div id="calendar-view" class="flex-1 overflow-x-auto">
          </div>
        </section>
      </div>
    </div>
  </div>
  <!-- 일정 추가 모달 -->
  <div id="event-modal" class="hidden fixed inset-0 bg-black/50 backdrop-blur-sm z-[9999] flex items-center justify-center p-4">
    <div class="bg-white w-full max-w-lg rounded-[2rem] shadow-2xl border border-gray-100 animate-in fade-in zoom-in duration-300 flex flex-col max-h-[90vh] overflow-hidden">

      <!-- 헤더 (회색 배경) -->
      <div class="px-8 py-6 bg-gray-50/50 border-b border-gray-100 flex items-center justify-between shrink-0">
        <div>
          <h3 class="text-xl font-bold text-gray-900">새로운 일정 추가</h3>
          <p class="text-[11px] text-gray-400 mt-1 font-medium tracking-tight">멋진 하루를 계획해 보세요!</p>
        </div>
        <button onclick="closeAddEventModal()" class="text-gray-400 hover:text-black transition-colors">
          <i class="fa-solid fa-xmark text-xl"></i>
        </button>
      </div>

      <!-- 폼 영역 (스크롤 가능) -->
      <form id="event-form" class="p-8 space-y-6 overflow-y-auto custom-scrollbar">

        <!-- 1. 일정 분류 선택 (개인/그룹) -->
        <div>
          <label class="block text-[12px] font-bold text-gray-600 mb-2 ml-1 tracking-tight">일정 분류</label>
          <div class="relative">
            <select id="targetType" onchange="toggleGroupSelect(this.value)" class="appearance-none w-full px-4 py-3.5 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-black focus:bg-white focus:border-black outline-none transition-all text-sm font-medium text-gray-700 cursor-pointer">
              <option value="PRIVATE">🔒 개인 일정</option>
              <option value="GROUP">👥 그룹 일정</option>
            </select>
            <i class="fa-solid fa-chevron-down absolute right-4 top-1/2 -translate-y-1/2 text-[10px] text-gray-400 pointer-events-none"></i>
          </div>
        </div>

        <!-- 2. 그룹 선택창 (기본값 숨김) -->
        <div id="group-select-container" class="hidden animate-in slide-in-from-top-2 duration-200">
          <label class="block text-[12px] font-bold text-gray-600 mb-2 ml-1 tracking-tight">대상 그룹 선택</label>
          <div class="relative">
            <select id="groupId" class="appearance-none w-full px-4 py-3.5 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-black focus:bg-white focus:border-black outline-none transition-all text-sm font-medium text-gray-700 cursor-pointer">
              <option value="">그룹을 선택해주세요</option>
            </select>
            <i class="fa-solid fa-chevron-down absolute right-4 top-1/2 -translate-y-1/2 text-[10px] text-gray-400 pointer-events-none"></i>
          </div>
        </div>

        <!-- 3. 일정명 -->
        <div>
          <label class="block text-[12px] font-bold text-gray-600 mb-2 ml-1 tracking-tight">일정명</label>
          <input type="text" name="title" required placeholder="예: 프로젝트 기획 회의"
                 class="w-full px-4 py-3.5 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-black focus:bg-white focus:border-black outline-none transition-all text-sm font-medium">
        </div>

        <!-- 4. 일정 내용 -->
        <div>
          <label class="block text-[12px] font-bold text-gray-600 mb-2 ml-1 tracking-tight">일정 내용</label>
          <textarea rows="4" name="content" placeholder="내용을 입력하세요."
                    class="w-full px-4 py-3.5 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-black focus:bg-white focus:border-black outline-none transition-all text-sm resize-none min-h-[120px]"></textarea>
        </div>
        <div>
          <label class="block text-[12px] font-bold text-gray-600 mb-2 ml-1 tracking-tight">장소</label>
          <div class="relative">
            <i class="fa-solid fa-location-dot absolute left-4 top-1/2 -translate-y-1/2 text-gray-300 text-sm"></i>
            <input type="text" name="location" placeholder="어디서 진행되나요?"
                   class="w-full pl-11 pr-4 py-3.5 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-black focus:bg-white focus:border-black outline-none transition-all text-sm placeholder:text-gray-300 font-medium">
          </div>
        </div>

        <!-- 5. 시작/종료 일시 (수직 배치로 짤림 방지) -->
        <div class="space-y-5">
          <div>
            <label class="block text-[12px] font-bold text-gray-600 mb-2 ml-1 tracking-tight">시작 일시</label>
            <div class="flex gap-2 w-full"> <input type="date" id="startDate"
                                                   class="flex-[1.5] min-w-0 px-4 py-3.5 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-black focus:bg-white focus:border-black outline-none transition-all text-sm font-medium text-gray-700">
              <input type="time" id="startTime"
                     class="flex-1 min-w-0 px-4 py-3.5 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-black focus:bg-white focus:border-black outline-none transition-all text-sm font-medium text-gray-700">
            </div>
          </div>

          <div class="mt-5">
            <label class="block text-[12px] font-bold text-gray-600 mb-2 ml-1 tracking-tight">종료 일시</label>
            <div class="flex gap-2 w-full">
              <input type="date" id="endDate" required
                     class="flex-[1.5] min-w-0 px-4 py-3.5 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-black focus:bg-white focus:border-black outline-none transition-all text-sm font-medium text-gray-700">
              <input type="time" id="endTime"
                     class="flex-1 min-w-0 px-4 py-3.5 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-black focus:bg-white focus:border-black outline-none transition-all text-sm font-medium text-gray-700">
            </div>
          </div>
        </div>

        <div>
          <label class="block text-[12px] font-bold text-gray-600 mb-3 ml-1 tracking-tight">배경색 선택</label>
          <div class="flex gap-4 px-1">
            <label class="relative cursor-pointer">
              <input type="radio" name="color" value="bg-gray-800" class="peer sr-only">
              <div class="w-8 h-8 rounded-full bg-gray-800 peer-checked:ring-offset-2 peer-checked:ring-2 peer-checked:ring-gray-800 transition-all"></div>
            </label>
            <label class="relative cursor-pointer">
              <input type="radio" name="color" value="bg-indigo-500" class="peer sr-only">
              <div class="w-8 h-8 rounded-full bg-indigo-500 peer-checked:ring-offset-2 peer-checked:ring-2 peer-checked:ring-indigo-500 transition-all"></div>
            </label>
            <label class="relative cursor-pointer">
              <input type="radio" name="color" value="bg-rose-500" class="peer sr-only">
              <div class="w-8 h-8 rounded-full bg-rose-500 peer-checked:ring-offset-2 peer-checked:ring-2 peer-checked:ring-rose-500 transition-all"></div>
            </label>
            <label class="relative cursor-pointer">
              <input type="radio" name="color" value="bg-emerald-500" class="peer sr-only">
              <div class="w-8 h-8 rounded-full bg-emerald-500 peer-checked:ring-offset-2 peer-checked:ring-2 peer-checked:ring-emerald-500 transition-all"></div>
            </label>
          </div>
        </div>
      </form>

      <!-- 푸터 버튼 -->
      <div class="p-8 bg-white border-t border-gray-100 shrink-0">
        <div class="flex items-center gap-3">
          <button type="button" onclick="closeAddEventModal()" class="flex-1 py-3.5 border border-gray-200 text-gray-500 font-bold rounded-xl hover:bg-gray-50 transition-all text-sm">취소</button>
          <button type="submit" form="event-form" class="flex-[2] py-3.5 bg-gray-900 text-white font-bold rounded-xl hover:bg-black shadow-lg shadow-gray-200 transition-all text-sm">일정 저장하기</button>
        </div>
      </div>
    </div>
  </div>

  <style>
    /* 깔끔한 스크롤바 스타일 */
    .custom-scrollbar::-webkit-scrollbar {
      width: 6px;
    }
    .custom-scrollbar::-webkit-scrollbar-track {
      background: transparent;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: #e5e7eb;
      border-radius: 10px;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover {
      background: #d1d5db;
    }

    #calendar-view.weekly-active {
        margin-top: -30px !important;
        position: relative;
        z-index: 10;
    }

    .calendar-container:has(#calendar-view.weekly-active) {
        overflow: visible !important;
    }
  </style>
  <script src="/js/schedule.js"></script>
</main>
</html>
