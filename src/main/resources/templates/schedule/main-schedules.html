<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/base-layout}">
<main layout:fragment="content">
  <div class="max-w-7xl mx-auto p-6">
    <div class="flex flex-col lg:flex-row gap-8">

      <div class="lg:w-80 shrink-0 space-y-6">

        <div class="bg-indigo-600 rounded-3xl p-6 text-white shadow-xl shadow-indigo-100 relative overflow-hidden">
          <div class="relative z-10">
            <h3 th:text="|안녕하세요, ${#authentication.principal.name}님!|" class="text-xl font-black mb-1"></h3>
            <p class="text-indigo-100 text-xs font-medium leading-relaxed">오늘 예정된 일정은 총 <span class="text-white font-bold underline">4건</span>입니다.</p>
          </div>
          <i class="fa-solid fa-bolt absolute -right-2 -bottom-2 text-6xl text-white/10 -rotate-12"></i>
        </div>

        <div id="side-schedules-container" class="bg-white rounded-3xl p-6 border border-gray-100 shadow-sm animate-in fade-in slide-in-from-bottom-3 duration-300 hidden">
          <h4 class="text-sm font-bold text-gray-900 mb-4 flex items-center justify-between">
            <span class="flex items-center gap-2">
              <i class="fa-solid fa-calendar-day text-indigo-500"></i>
              <span id="side-selected-date"></span>
            </span>
          </h4>

          <div id="side-schedule-list" class="space-y-3 max-h-[350px] overflow-y-auto pr-1 custom-scrollbar">
          </div>
        </div>

        <div class="bg-white rounded-3xl p-6 border border-gray-100 shadow-sm">
          <h4 class="text-sm font-bold text-gray-900 mb-5 flex items-center gap-2">
            <i class="fa-solid fa-thumbtack text-indigo-500"></i> 메모
          </h4>
          <div class="space-y-3">
            <div class="p-4 bg-amber-50/50 border border-amber-100 rounded-2xl cursor-pointer hover:shadow-md transition-all">
              <p class="text-xs font-bold text-amber-800">그룹 로고 시안 확정하기</p>
              <p class="text-[10px] text-amber-600/70 mt-1 font-medium">디자인그룹</p>
            </div>
            <div class="p-4 bg-indigo-50/50 border border-indigo-100 rounded-2xl cursor-grab">
              <p class="text-xs font-bold text-indigo-800">포트폴리오 내용 정리</p>
              <p class="text-[10px] text-indigo-600/70 mt-1 font-medium">개인공부</p>
            </div>
          </div>
        </div>

      </div>

      <div class="flex-1 flex flex-col gap-6">
        <section class="bg-white p-4 md:p-8 rounded-3xl shadow-sm border border-gray-200 min-h-[800px] flex flex-col">

          <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-6 mb-8 pb-6 border-b border-gray-50">
            <div class="flex items-center gap-4">
              <h2 class="text-xl md:text-2xl font-black text-gray-900 tracking-tight"></h2>
              <div class="flex p-1 bg-gray-100 rounded-xl border border-gray-200/50">
                <button id="btn-monthly" class="tab-btn px-4 py-1.5 text-[11px] font-bold rounded-lg bg-white shadow-sm text-indigo-600 transition-all">월간</button>
                <button id="btn-weekly" class="tab-btn px-4 py-1.5 text-[11px] font-bold text-gray-400 hover:text-gray-600 transition-all">주간</button>
              </div>
            </div>

            <div class="flex items-center gap-3">
              <div id="calendar-nav-bar" class="flex items-center bg-gray-50 rounded-xl p-1 border border-gray-100">
                <button class="w-8 h-8 flex items-center justify-center hover:bg-white hover:shadow-sm rounded-lg text-gray-500 transition-all"><i class="fa-solid fa-chevron-left text-[10px]"></i></button>
                <button class="px-3 text-[11px] font-bold text-gray-700 hover:text-indigo-600 transition-colors">오늘</button>
                <button class="w-8 h-8 flex items-center justify-center hover:bg-white hover:shadow-sm rounded-lg text-gray-500 transition-all"><i class="fa-solid fa-chevron-right text-[10px]"></i></button>
              </div>

              <button onclick="openAddEventModal()" class="px-4 py-2.5 bg-gray-900 text-white text-xs font-bold rounded-xl hover:bg-black shadow-lg shadow-gray-200 flex items-center gap-2 transition-all active:scale-95">
                <i class="fa-solid fa-plus text-[10px]"></i> 일정 추가
              </button>
            </div>
          </div>

          <div id="calendar-view" class="flex-1 overflow-x-auto">
          </div>
        </section>
      </div>
    </div>
  </div>

  <div id="event-modal" class="hidden fixed inset-0 bg-black/50 backdrop-blur-sm z-[9999] flex items-center justify-center p-4">
    <div class="bg-white w-full max-w-lg rounded-[2rem] shadow-2xl border border-gray-100 animate-in fade-in zoom-in duration-300 flex flex-col max-h-[90vh] overflow-hidden">

      <div class="px-8 py-6 bg-gray-50/50 border-b border-gray-100 flex items-center justify-between shrink-0">
        <div>
          <h3 id="modal-mode-title" class="text-xl font-bold text-gray-900">새로운 일정 추가</h3>
          <p id="modal-mode-desc" class="text-[11px] text-gray-400 mt-1 font-medium tracking-tight">멋진 하루를 계획해 보세요!</p>
        </div>
        <button onclick="closeAddEventModal()" class="text-gray-400 hover:text-black transition-colors">
          <i class="fa-solid fa-xmark text-xl"></i>
        </button>
      </div>

      <form id="event-form" class="p-8 overflow-y-auto custom-scrollbar flex-1">

        <div id="edit-mode-header" class="hidden p-4 bg-gray-50 border border-gray-100 rounded-2xl flex items-center gap-2 animate-in fade-in duration-200">
          <i id="edit-mode-icon" class="fa-solid text-xs"></i>
          <span id="edit-mode-label" class="text-xs font-bold shrink-0"></span>
          <span id="edit-mode-value" class="text-xs font-black"></span>
        </div>

        <div id="modal-target-type-container">
          <label class="block text-[12px] font-bold text-gray-600 mb-2 ml-1 tracking-tight">일정 분류</label>
          <div class="relative">
            <select id="targetType" onchange="toggleGroupSelect(this.value)" class="appearance-none w-full px-4 py-3.5 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-black focus:bg-white focus:border-black outline-none transition-all text-sm font-medium text-gray-700 cursor-pointer">
              <option value="PRIVATE">🔒 개인 일정</option>
              <option value="GROUP">👥 그룹 일정</option>
            </select>
            <i class="fa-solid fa-chevron-down absolute right-4 top-1/2 -translate-y-1/2 text-[10px] text-gray-400 pointer-events-none"></i>
          </div>
        </div>

        <div id="group-select-container" class="hidden mt-6 animate-in slide-in-from-top-2 duration-200">
          <label class="block text-[12px] font-bold text-gray-600 mb-2 ml-1 tracking-tight">대상 그룹 선택</label>
          <div class="relative">
            <select id="groupId" class="appearance-none w-full px-4 py-3.5 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-black focus:bg-white focus:border-black outline-none transition-all text-sm font-medium text-gray-700 cursor-pointer">
              <option value="">그룹을 선택해주세요</option>
            </select>
            <i class="fa-solid fa-chevron-down absolute right-4 top-1/2 -translate-y-1/2 text-[10px] text-gray-400 pointer-events-none"></i>
          </div>
        </div>

        <div class="mt-6">
          <label class="block text-[12px] font-bold text-gray-600 mb-2 ml-1 tracking-tight">일정명</label>
          <input type="text" name="title" id="form-title" required placeholder="예: 프로젝트 기획 회의"
                 class="w-full px-4 py-3.5 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-black focus:bg-white focus:border-black outline-none transition-all text-sm font-medium">
        </div>

        <div class="mt-6">
          <label class="block text-[12px] font-bold text-gray-600 mb-2 ml-1 tracking-tight">일정 내용</label>
          <textarea rows="4" name="content" id="form-content" placeholder="내용을 입력하세요."
                    class="w-full px-4 py-3.5 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-black focus:bg-white focus:border-black outline-none transition-all text-sm resize-none min-h-[120px]"></textarea>
        </div>

        <div class="mt-6">
          <label class="block text-[12px] font-bold text-gray-600 mb-2 ml-1 tracking-tight">장소</label>
          <div class="relative">
            <i class="fa-solid fa-location-dot absolute left-4 top-1/2 -translate-y-1/2 text-gray-300 text-sm"></i>
            <input type="text" name="location" id="form-location" placeholder="어디서 진행되나요?"
                   class="w-full pl-11 pr-4 py-3.5 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-black focus:bg-white focus:border-black outline-none transition-all text-sm placeholder:text-gray-300 font-medium">
          </div>
        </div>

        <div class="space-y-5 mt-6">
          <div>
            <label class="block text-[12px] font-bold text-gray-600 mb-2 ml-1 tracking-tight">시작 일시</label>
            <div class="flex gap-2 w-full">
              <input type="date" id="startDate" class="flex-[1.5] min-w-0 px-4 py-3.5 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-black focus:bg-white focus:border-black outline-none transition-all text-sm font-medium text-gray-700">
              <input type="time" id="startTime" class="flex-1 min-w-0 px-4 py-3.5 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-black focus:bg-white focus:border-black outline-none transition-all text-sm font-medium text-gray-700">
            </div>
          </div>
          <div class="mt-5">
            <label class="block text-[12px] font-bold text-gray-600 mb-2 ml-1 tracking-tight">종료 일시</label>
            <div class="flex gap-2 w-full">
              <input type="date" id="endDate" required class="flex-[1.5] min-w-0 px-4 py-3.5 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-black focus:bg-white focus:border-black outline-none transition-all text-sm font-medium text-gray-700">
              <input type="time" id="endTime" class="flex-1 min-w-0 px-4 py-3.5 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-black focus:bg-white focus:border-black outline-none transition-all text-sm font-medium text-gray-700">
            </div>
          </div>
        </div>

        <div class="mt-6">
          <label class="block text-[12px] font-bold text-gray-600 mb-3 ml-1 tracking-tight">배경색 선택</label>
          <div class="flex gap-4 px-1">
            <label class="relative cursor-pointer">
              <input type="radio" name="color" value="bg-gray-800" class="peer sr-only">
              <div class="w-8 h-8 rounded-full bg-gray-800 peer-checked:ring-offset-2 peer-checked:ring-2 peer-checked:ring-gray-800 transition-all"></div>
            </label>
            <label class="relative cursor-pointer">
              <input type="radio" name="color" value="bg-indigo-500" class="peer sr-only">
              <div class="w-8 h-8 rounded-full bg-indigo-500 peer-checked:ring-offset-2 peer-checked:ring-2 peer-checked:ring-indigo-500 transition-all"></div>
            </label>
            <label class="relative cursor-pointer">
              <input type="radio" name="color" value="bg-rose-500" class="peer sr-only">
              <div class="w-8 h-8 rounded-full bg-rose-500 peer-checked:ring-offset-2 peer-checked:ring-2 peer-checked:ring-rose-500 transition-all"></div>
            </label>
            <label class="relative cursor-pointer">
              <input type="radio" name="color" value="bg-emerald-500" class="peer sr-only">
              <div class="w-8 h-8 rounded-full bg-emerald-500 peer-checked:ring-offset-2 peer-checked:ring-2 peer-checked:ring-emerald-500 transition-all"></div>
            </label>
          </div>
        </div>

        <div id="modal-status-checkbox-container" class="hidden border-t border-gray-100 pt-5 mt-6">
          <div class="flex items-center gap-3 px-1">
            <label class="text-[12px] font-bold text-gray-600 tracking-tight shrink-0 min-w-[70px]">진행 상태</label>
            <label class="inline-flex items-center gap-2 cursor-pointer group select-none">
              <input type="checkbox" name="isCompleted" id="form-isCompleted" class="rounded-lg border-gray-200 text-indigo-600 focus:ring-black w-4 h-4 transition-all cursor-pointer">
              <span class="text-xs font-medium text-gray-950 tracking-tight group-hover:text-indigo-600 transition-colors">완료</span>
            </label>
          </div>
        </div>

      </form>

      <div class="p-8 bg-white border-t border-gray-100 shrink-0">
        <div class="flex items-center gap-3">
          <button type="button" onclick="closeAddEventModal()" class="flex-1 py-3.5 border border-gray-200 text-gray-500 font-bold rounded-xl hover:bg-gray-50 transition-all text-sm">취소</button>
          <button type="submit" form="event-form" class="flex-[2] py-3.5 bg-gray-900 text-white font-bold rounded-xl hover:bg-black shadow-lg shadow-gray-200 transition-all text-sm">
            <span id="submit-btn-text">일정 저장하기</span>
          </button>
        </div>
      </div>
    </div>
  </div>

  <div id="detail-event-modal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-md z-[9999] items-center justify-center p-4 animate-in fade-in duration-300">
    <div class="bg-white w-full max-w-xl rounded-[2rem] shadow-2xl border border-gray-100 overflow-hidden flex flex-col max-h-[90vh]">

      <div class="px-8 py-6 bg-gray-50/50 border-b border-gray-100 flex items-center justify-between shrink-0">
        <div class="space-y-1 flex-1 pr-6">
          <div class="flex items-center gap-4">
            <span id="detail-targetType" class="inline-flex items-center gap-1 text-[10px] font-black text-indigo-600 bg-indigo-50 px-3 py-1 rounded-full uppercase tracking-tighter">
              👥 그룹 일정
            </span>
            <span id="detail-groupName" class="hidden"><span id="detail-groupName-text"></span></span>
          </div>
          <h3 id="detail-title" class="text-xl font-bold text-gray-900 tracking-tight leading-tight"></h3>
        </div>
        <button onclick="closeDetailEventModal()" class="text-gray-400 hover:text-black transition-colors">
          <i class="fa-solid fa-xmark text-xl"></i>
        </button>
      </div>

      <div class="p-8 space-y-6 overflow-y-auto custom-scrollbar flex-1">

        <div id="detail-group-item" class="hidden">
          <div class="flex items-center gap-3 px-1">
            <label class="text-[12px] font-bold text-gray-600 tracking-tight shrink-0 min-w-[70px]">소속 그룹</label>
            <div class="flex items-center gap-2 text-xs font-semibold text-gray-700 tracking-tight flex-1">
              <img id="detail-group-image" src="" alt="그룹 이미지" class="hidden w-5 h-5 rounded-full object-cover border border-gray-100 shadow-sm shrink-0">
              <i id="detail-group-icon" class="hidden fa-solid fa-users text-[13px] text-indigo-400 w-5 text-center shrink-0"></i>
              <span id="detail-group-name" class="font-bold"></span>
            </div>
          </div>
        </div>

        <div>
          <div class="flex items-center gap-3 px-1">
            <label class="text-[12px] font-bold text-gray-600 tracking-tight shrink-0 min-w-[70px]">작성자</label>
            <div class="flex items-center gap-1.5 text-xs font-medium text-gray-700 tracking-tight flex-1">
              <i class="fa-solid fa-user text-[11px] w-4 text-center text-gray-400"></i>
              <span id="detail-creator-name" class="font-bold"></span>
            </div>
          </div>
        </div>

        <div>
          <div class="flex items-baseline gap-3 px-1">
            <label class="text-[12px] font-bold text-gray-600 tracking-tight shrink-0 min-w-[70px]">기간</label>
            <div class="flex items-center gap-1.5 text-xs font-bold text-indigo-600 tracking-tight">
              <i class="fa-solid fa-calendar-check text-[11px] w-4 text-center"></i>
              <span id="detail-datetime"></span>
            </div>
          </div>
        </div>

        <div>
          <div class="flex items-baseline gap-3 px-1">
            <label class="text-[12px] font-bold text-gray-600 tracking-tight shrink-0 min-w-[70px]">장소</label>
            <div class="flex items-center gap-1.5 text-xs font-medium text-indigo-400 tracking-tight">
              <i class="fa-solid fa-location-dot text-[11px] w-4 text-center"></i>
              <span id="detail-location"></span>
            </div>
          </div>
        </div>

        <div>
          <div class="flex items-baseline gap-3 px-1">
            <label class="text-[12px] font-bold text-gray-600 tracking-tight shrink-0 min-w-[70px]">일정 내용</label>
            <div class="flex items-center gap-1.5 text-xs font-medium text-gray-950 tracking-tight flex-1">
              <i class="fa-solid fa-align-left text-[11px] w-4 text-center text-gray-400 self-center"></i>
              <div id="detail-content" class="whitespace-pre-wrap leading-relaxed flex-1"></div>
            </div>
          </div>
        </div>

        <div>
          <div class="flex items-center gap-3 px-1">
            <label class="text-[12px] font-bold text-gray-600 tracking-tight shrink-0 min-w-[70px]">진행 상태</label>
            <div class="flex items-center gap-1.5 flex-1">
              <i id="detail-status-uncheck" class="hidden fa-regular fa-square text-[11px] text-gray-300 w-4 text-center"></i>
              <i id="detail-status-checked" class="hidden fa-solid fa-square-check text-[11px] text-indigo-500 w-4 text-center"></i>
              <span id="detail-status-text" class="text-xs font-medium text-gray-950 tracking-tight"></span>
            </div>
          </div>
        </div>

        <div id="detail-comment-section" class="border-t border-gray-100 pt-6 space-y-4 hidden">
          <div class="flex items-center justify-between ml-1">
            <label class="block text-[12px] font-bold text-gray-600 tracking-tight">
              댓글 <span id="detail-comment-count" class="text-indigo-600 font-bold">2</span>
            </label>
          </div>

          <div id="detail-comment-list" class="space-y-4">
            <div id="comment-item-1" class="group p-5 bg-gray-50 border border-gray-100 rounded-[1.5rem] flex items-start gap-4 transition-all hover:bg-white hover:shadow-md">
              <img src="/images/default-profile.png" class="w-9 h-9 rounded-full object-cover shrink-0 shadow-sm border border-gray-100">
              <div class="flex-1 min-w-0 space-y-1.5">
                <div class="flex items-center justify-between">
                  <div class="flex items-center gap-2">
                    <span class="text-[12px] font-bold text-gray-900">김철수 대리</span>
                    <span class="text-[9px] font-medium text-gray-400 uppercase">오전 11:20</span>
                  </div>
                  <div class="opacity-0 group-hover:opacity-100 flex items-center gap-2 transition-all">
                    <button type="button" onclick="toggleEditCommentForm(1)" title="댓글 수정" class="text-gray-400 hover:text-indigo-500 transition-colors"><i class="fa-solid fa-pen text-[10px]"></i></button>
                    <button type="button" onclick="openDeleteCommentModal(1)" title="댓글 삭제" class="text-gray-400 hover:text-rose-500 transition-colors"><i class="fa-solid fa-trash-can text-[10px]"></i></button>
                  </div>
                </div>

                <p id="comment-text-1" class="text-[12px] text-gray-600 font-medium leading-relaxed block">시안 준비 완료되었습니다. 회의 때 뵙겠습니다!</p>

                <div id="comment-edit-box-1" class="hidden mt-2 space-y-2">
                  <textarea id="comment-edit-input-1" rows="2" class="w-full p-3 bg-white border border-gray-200 rounded-xl text-[12px] font-medium leading-relaxed focus:ring-1 focus:ring-black focus:outline-none transition-all resize-none">시안 준비 완료되었습니다. 회의 때 뵙겠습니다!</textarea>
                  <div class="flex justify-end gap-1.5">
                    <button type="button" onclick="toggleEditCommentForm(1)" class="px-3 py-1.5 bg-gray-200 text-gray-600 text-[10px] font-bold rounded-lg hover:bg-gray-300 transition-colors">취소</button>
                    <button type="button" onclick="toggleEditCommentForm(1)" class="px-3 py-1.5 bg-gray-900 text-white text-[10px] font-bold rounded-lg hover:bg-black transition-colors">저장</button>
                  </div>
                </div>
              </div>
            </div>
          </div>

<!--          <div id="detail-comment-list" class="space-y-4">-->

<!--            <div id="comment-empty-state" class="py-8 px-4 text-center flex flex-col items-center justify-center animate-in fade-in zoom-in-95 duration-200 border border-dashed border-gray-200 rounded-[1.5rem] relative overflow-hidden bg-gray-50/30">-->

<!--              <div class="w-10 h-10 bg-white rounded-full flex items-center justify-center text-gray-300 mb-2 border border-gray-100 shadow-inner">-->
<!--                <i class="fa-regular fa-comments text-base"></i>-->
<!--              </div>-->

<!--              <h5 class="text-[11px] font-bold text-gray-400">아직 등록된 댓글이 없습니다</h5>-->
<!--              <p class="text-[10px] text-gray-400/70 mt-0.5 font-medium tracking-tight">이 일정에 대한 첫 번째 의견을 남겨보세요!</p>-->

<!--              <div class="absolute -bottom-4 -right-3 text-indigo-100/30 pointer-events-none select-none text-6xl -rotate-12">-->
<!--                <i class="fa-solid fa-comment-dots"></i>-->
<!--              </div>-->
<!--            </div>-->

<!--          </div>-->

          <div class="relative group mt-4">
            <input type="text" placeholder="댓글을 입력하세요..."
                   class="w-full pl-5 pr-20 py-3.5 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-black focus:bg-white focus:border-black outline-none transition-all text-sm font-medium tracking-tight">
            <button class="absolute right-2 top-2 bottom-2 px-5 bg-gray-900 text-white text-[11px] font-black rounded-xl hover:bg-black transition-all">
              등록
            </button>
          </div>
        </div>

      </div>

      <div class="p-8 bg-white border-t border-gray-100 shrink-0">
        <div class="flex items-center gap-3">
          <button type="button" onclick="openDeleteScheduleModal()" class="flex-1 py-3.5 border border-gray-200 text-rose-500 hover:bg-rose-50 font-bold rounded-xl transition-all text-sm">삭제</button>
          <button type="button" onclick="handleEditScheduleTrigger()" class="flex-[2] py-3.5 bg-gray-900 text-white font-bold rounded-xl hover:bg-black shadow-lg shadow-gray-200 transition-all text-sm">수정하기</button>
        </div>
      </div>

    </div>
  </div>

  <div id="deleteScheduleConfirmModal" class="hidden fixed inset-0 bg-black/50 backdrop-blur-sm z-[9999] flex items-center justify-center p-4">
    <div class="bg-white w-full max-w-sm rounded-[2rem] shadow-2xl border border-gray-100 animate-in fade-in zoom-in duration-200 overflow-hidden">
      <div class="p-6 text-center space-y-3 pt-8">
