<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<aside th:fragment="menu(activeMenu)" class="w-full md:w-1/3 lg:w-1/4 flex flex-col gap-2">
  <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-200 h-fit">
    <button class="w-full bg-gray-600 hover:bg-black text-white py-3 px-5 rounded-lg mb-2 text-left shadow-md">
      회원정보
    </button>
    <button class="w-full bg-gray-50 text-gray-500 font-medium py-3 px-5 rounded-lg text-left hover:bg-gray-100 transition-all">
      기타
    </button>
  </div>
</aside>

<section th:fragment="summary(activeMenu)" class="bg-white p-6 rounded-2xl shadow-sm border border-gray-200 flex items-center justify-between">
  <div class="flex items-center gap-5">
    <div class="w-16 h-16 rounded-full overflow-hidden border border-gray-100 shadow-sm">
      <img id="profile-img" src=""
           alt="profile" class="w-full h-full object-cover">
    </div>
    <div>
      <h2 id="profile-name" class="text-lg font-bold text-gray-800 leading-tight"></h2>
      <p id="profile-email" class="text-xs text-gray-400 font-normal"></p>
    </div>
  </div>
  <button th:if="${activeMenu == 'info'}"
          th:onclick="|location.href='@{/members/edit}'|" class="bg-gray-800 hover:bg-black text-white text-sm font-medium px-5 py-2 rounded-lg transition-all shadow-sm">
    수정
  </button>
</section>
</html>
