<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.w3.org/1999/xhtml" lang="ko">
<nav th:fragment="mainHeader" class="bg-white shadow-sm px-10 h-20 flex items-center justify-between sticky top-0 z-50">
    <div class="z-10 flex-1">
    </div>

    <div class="absolute inset-0 flex items-center justify-center pointer-events-none">
        <a href="/" class="font-black text-xl md:text-2xl text-gray-900 tracking-tighter pointer-events-auto">
            일정
        </a>
    </div>
    <div sec:authorize="isAnonymous()" class="flex-1 flex items-center justify-end md:pr-10 gap-8">

        <a href="/members/login" class="group relative flex flex-col items-center">
            <i class="fa-solid fa-right-to-bracket text-gray-500 text-xl group-hover:text-black transition-colors"></i>
            <span class="tooltip">로그인</span>
        </a>

        <a href="/members/signup" class="group relative flex flex-col items-center">
            <i class="fa-solid fa-user-plus text-gray-500 text-xl group-hover:text-black transition-colors"></i>
            <span class="tooltip">회원가입</span>
        </a>

    </div>
    <div sec:authorize="isAuthenticated()" class="flex-1 flex items-center justify-end md:pr-10 gap-8">

        <div class="relative flex items-center">
            <button id="notiButton" class="relative group cursor-pointer flex items-center mt-0.5 focus:outline-none py-1">
                <i class="fa-solid fa-bell text-gray-500 text-lg group-hover:text-black transition-colors"></i>
                <span id="notiCount" class="hidden absolute -top-1.5 -right-1.5 bg-red-500 text-white text-[9px] font-bold px-1 py-0.5 rounded-full shadow-sm leading-none">
                    0
                </span>
                <span class="tooltip">알림</span>
            </button>

            <div id="notiDropdown" class="hidden absolute top-full right-0 mt-2 w-80 bg-white rounded-xl shadow-2xl border border-gray-100 overflow-hidden z-[999]">
                <div class="px-4 py-3 bg-gray-50 border-b border-gray-100 flex justify-between items-center">
                    <h4 class="text-[11px] font-bold text-gray-900 uppercase tracking-tight">그룹 초대 알림</h4>
                </div>

                <div id="notiListContainer" class="max-h-[380px] overflow-y-auto">

                </div>
            </div>
        </div>

        <div class="relative flex items-center">
            <button id="profileButton" class="flex items-center gap-2 focus:outline-none group py-1">
                <div class="w-8 h-8 rounded-full overflow-hidden shadow-sm border border-gray-100 group-hover:border-gray-300 transition-all">
                    <img th:src="@{|${#authentication.principal.profileImage == null ? '/images/default-profile.png' : '/member/' + #authentication.principal.profileImage}|}"
                         alt="profile" class="w-full h-full object-cover">
                </div>

                <i class="fa-solid fa-chevron-down text-[9px] text-gray-400 group-hover:text-gray-600 pt-0.5"></i>
            </button>

            <div id="profileDropdown" class="hidden absolute top-full right-0 mt-2 w-48 bg-white rounded-xl shadow-2xl border border-gray-100 py-2 z-[999]">
                <div class="px-4 py-3 border-b border-gray-50">
                    <p class="text-xs text-gray-400 font-medium">접속 중인 계정</p>
                    <p th:text="${#authentication.principal.username}" class="text-sm font-bold text-gray-800 truncate"></p>
                </div>
                <a href="/members/me" class="flex items-center gap-3 px-4 py-3 text-sm text-gray-600 hover:bg-gray-50 transition-colors">
                    <i class="fa-solid fa-user text-gray-400 w-4"></i> 마이페이지
                </a>
                <div class="border-t border-gray-50 mt-1">
                    <a href="/logout" class="flex items-center gap-3 px-4 py-3 text-sm text-red-500 hover:bg-red-50 transition-colors">
                        <i class="fa-solid fa-right-from-bracket w-4"></i> 로그아웃
                    </a>
                </div>
            </div>
        </div>
    </div>
    <script>
        const profileButton = document.getElementById('profileButton');
        const profileDropdown = document.getElementById('profileDropdown');
        const notiButton = document.getElementById('notiButton');
        const notiDropdown = document.getElementById('notiDropdown');

        document.addEventListener('DOMContentLoaded', function() {

            const isAuthenticated = document.getElementById('notiButton') !== null;

            if (isAuthenticated) {
                loadNotificationSummary();
            }

            const notiButton = document.getElementById('notiButton');
            if (notiButton) {
                notiButton.addEventListener('click', () => {
                    loadNotificationSummary();
                });
            }
        });

        async function loadNotificationSummary() {
            try {
                const response = await fetch('/api/members/me/notifications/summary');
                const result = await response.json();

                if (response.ok) {
                    updateNotificationUI(result.data);
                }
            } catch (error) {
                console.error("알림 로드 실패:", error);
            }
        }

        function updateNotificationUI(data) {
            const countBadge = document.getElementById('notiCount');
            const container = document.getElementById('notiListContainer');

            if (data.count > 0) {
                countBadge.innerText = data.count > 99 ? '99+' : data.count;
                countBadge.classList.remove('hidden');
            } else {
                countBadge.classList.add('hidden');
            }

            if (!data.invitations || data.invitations.length === 0) {
                container.innerHTML = `
                    <div class="py-12 text-center">
                        <i class="fa-solid fa-bell-slash text-gray-200 text-2xl mb-2"></i>
                        <p class="text-[11px] text-gray-400 font-medium">새로운 알림이 없습니다.</p>
                    </div>`;
                return;
            }

            container.innerHTML = data.invitations.map(item => `
                <div class="p-4 border-b border-gray-100 hover:bg-gray-50/50 transition-colors">
                    <div class="flex flex-col gap-3">
                        <div class="flex items-start gap-3">
                            <div class="w-9 h-9 rounded-lg bg-gray-100 overflow-hidden flex items-center justify-center shrink-0">
                                ${item.groupImage
                                    ? `<img src="/group/${item.groupImage}" class="w-full h-full object-cover">`
                                    : `<i class="fa-solid fa-users text-xs text-gray-300"></i>`}
                            </div>
                            <div class="flex-1 min-w-0">
                                <p class="text-sm font-bold text-gray-800 truncate">${item.name}</p>
                                <p class="text-[11px] text-gray-400 mt-0.5 font-medium leading-tight">
                                    그룹 초대 요청이 도착했습니다.
                                </p>
                            </div>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="handleInvitation(${item.id}, 'ACCEPT')" class="flex-1 py-2 bg-gray-900 text-white text-[11px] font-bold rounded-lg hover:bg-black transition-all">수락</button>
                            <button onclick="handleInvitation(${item.id}, 'REJECT')" class="flex-1 py-2 bg-gray-100 text-gray-500 text-[11px] font-bold rounded-lg hover:bg-gray-200 transition-all">거절</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        async function handleInvitation(invitationId, status) {
            const endpoint = status === 'ACCEPT' ? 'accept' : 'reject';

            try {
                const response = await fetch(`/api/members/me/invitations/${invitationId}/${endpoint}`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    }
                });

                const result = await response.json();

                if (response.ok) {
                    if (typeof showToast === 'function') {
                        showToast('success', result.message);
                    } else {
                        alert(result.message);
                    }

                    setTimeout(() => {
                        loadNotificationSummary();
                    }, 2000);

                } else {
                    if (typeof showToast === 'function') {
                        showToast('error', result.message);
                    } else {
                        alert(result.message);
                    }
                }
            } catch (error) {
                console.error(`초대 ${status} 처리 중 오류:`, error);
                if (typeof showToast === 'function') {
                    showToast('error', '서버와 통신 중 오류가 발생했습니다.');
                }
            }
        }

        profileButton.addEventListener('click', (e) => {
            e.stopPropagation();
            profileDropdown.classList.toggle('hidden');
        });

        notiButton.addEventListener('click', (e) => {
            e.stopPropagation();
            if(profileDropdown) profileDropdown.classList.add('hidden');
            notiDropdown.classList.toggle('hidden');
        });

        window.addEventListener('click', () => {
            if (!profileDropdown.classList.contains('hidden')) {
                profileDropdown.classList.add('hidden');
            }
        });

        if(profileDropdown) profileDropdown.addEventListener('click', (e) => e.stopPropagation());
        if(notiDropdown) notiDropdown.addEventListener('click', (e) => e.stopPropagation());
    </script>
</nav>
</html>
