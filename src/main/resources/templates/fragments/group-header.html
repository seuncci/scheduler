<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<div th:fragment="header(currentTab)">
    <div class="flex flex-col lg:flex-row lg:items-center justify-between gap-6 mb-8 pb-8 border-b border-gray-100">
        <div class="flex items-center gap-6">
            <div class="w-24 h-24 rounded-2xl bg-gray-100 flex items-center justify-center border border-indigo-100 shrink-0 shadow-sm">
                <img th:if="${group.groupImage != null}"
                     th:src="@{|/group/${group.groupImage}|}"
                     class="w-full h-full object-cover"
                     alt="그룹 로고">
                <i th:unless="${group.groupImage != null}" class="fa-solid fa-users text-4xl text-gray-300"></i>
            </div>
            <div>
                <div class="flex items-center gap-3">
                    <h2 th:text="${group.name}" class="text-2xl font-black text-gray-900 leading-tight"></h2>
                </div>
                <p th:text="${group.description}" class="text-sm text-gray-400 mt-2 font-medium"></p>
                <div class="flex items-center gap-4 mt-3 text-xs text-gray-400">
                    <span th:text="|생성일: ${#temporals.format(group.createdDate, 'yyyy.MM.dd')}|"><i class="fa-regular fa-calendar-check mr-1.5"></i></span>
                    <span th:text="|멤버: ${group.memberCount}명|"><i class="fa-solid fa-user-group mr-1.5"></i></span>
                </div>
            </div>
        </div>

        <div class="flex items-center gap-2">
            <th:block th:if="${group.role.name == '관리자'}">
                <button onclick="openEditModal()" class="px-4 py-2.5 bg-white border border-gray-200 text-gray-700 font-bold rounded-xl hover:bg-gray-50 hover:border-gray-300 transition-all text-sm flex items-center gap-2 shadow-sm">
                    <i class="fa-solid fa-pen-to-square text-gray-400"></i> 정보 수정
                </button>
                <button onclick="openDeleteConfirm()" class="px-4 py-2.5 bg-red-50 text-red-500 font-bold rounded-xl hover:bg-red-100 transition-all text-sm flex items-center gap-2 border border-red-100">
                    <i class="fa-solid fa-trash-can"></i> 그룹 삭제
                </button>
            </th:block>

            <th:block th:unless="${group.role.name == '관리자'}">
                <button onclick="openLeaveConfirm()" class="px-4 py-2.5 bg-white border border-red-100 text-red-500 font-bold rounded-xl hover:bg-red-50 transition-all text-sm flex items-center gap-2 shadow-sm">
                    <i class="fa-solid fa-door-open"></i> 그룹 탈퇴
                </button>
            </th:block>
        </div>
    </div>

    <div class="flex gap-10 border-b border-gray-100 mb-8 overflow-x-auto">
        <a th:href="@{/members/me/groups/{id}(id=${group.id})}"
           th:classappend="${currentTab == 'members'} ? 'text-black border-black font-bold border-b-2' : 'text-gray-400 border-transparent font-medium hover:text-gray-600 hover:border-gray-200'"
           class="pb-4 text-sm whitespace-nowrap transition-all cursor-pointer border-b-2">
            <span th:text="${group.role.name == '관리자'} ? '멤버 관리' : '멤버 목록'"></span>
        </a>

        <button class="pb-4 text-sm font-medium text-gray-400 hover:text-gray-600 border-b-2 border-transparent hover:border-gray-200 whitespace-nowrap transition-all">
            그룹 일정 <span class="ml-1 text-[10px] bg-indigo-50 text-indigo-500 px-1.5 py-0.5 rounded-full">3</span>
        </button>

        <th:block th:if="${group.role.name == '관리자'}">
            <a th:href="@{/members/me/groups/{id}/invitation-links(id=${group.id})}"
               th:classappend="${currentTab == 'invitation'} ? 'text-black border-black font-bold border-b-2' : 'text-gray-400 border-transparent font-medium hover:text-gray-600 hover:border-gray-200'"
               class="pb-4 text-sm whitespace-nowrap transition-all cursor-pointer border-b-2">
                초대 링크 관리
            </a>

            <button class="pb-4 text-sm font-medium text-gray-400 hover:text-gray-600 border-b-2 border-transparent hover:border-gray-200 whitespace-nowrap transition-all">
                활동 로그
            </button>
        </th:block>
    </div>
    <div id="deleteConfirmModal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm z-[9999] flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-sm rounded-2xl shadow-2xl p-8 text-center animate-in fade-in zoom-in duration-200">
            <div class="w-16 h-16 bg-red-50 text-red-500 rounded-full flex items-center justify-center mx-auto mb-6">
                <i class="fa-solid fa-triangle-exclamation text-2xl"></i>
            </div>
            <h3 class="text-lg font-bold text-gray-900 mb-2">정말로 그룹을 삭제할까요?</h3>
            <p class="text-sm text-gray-400 leading-relaxed mb-8">그룹 내 모든 데이터와 활동 내역이 영구적으로 삭제되며, 이 작업은 되돌릴 수 없습니다.</p>
            <div class="flex gap-3">
                <button onclick="closeDeleteConfirm()" class="flex-1 py-3 bg-gray-50 text-gray-500 font-bold rounded-xl hover:bg-gray-100 transition-all text-sm">취소</button>
                <button id="confirmDeleteGroupBtn" class="flex-1 py-3 bg-red-500 text-white font-bold rounded-xl hover:bg-red-600 shadow-lg shadow-red-200 transition-all text-sm">삭제 승인</button>
            </div>
        </div>
    </div>
    <div id="leaveConfirmModal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm z-[9999] flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-sm rounded-2xl shadow-2xl p-8 text-center animate-in fade-in zoom-in duration-200">
            <div class="w-16 h-16 bg-red-50 text-red-500 rounded-full flex items-center justify-center mx-auto mb-6">
                <i class="fa-solid fa-triangle-exclamation text-2xl"></i>
            </div>
            <h3 class="text-lg font-bold text-gray-900 mb-2">그룹에서 탈퇴하시겠습니까?</h3>
            <p class="text-sm text-gray-400 leading-relaxed mb-8">탈퇴 시 이 그룹의 일정 및 활동 내역을 더 이상 확인할 수 없습니다.</p>
            <div class="flex gap-3">
                <button onclick="closeLeaveConfirm()" class="flex-1 py-3 bg-gray-50 text-gray-500 font-bold rounded-xl hover:bg-gray-100 transition-all text-sm">취소</button>
                <button onclick="leaveGroup()" class="flex-1 py-3 bg-red-500 text-white font-bold rounded-xl hover:bg-red-600 shadow-lg shadow-red-200 transition-all text-sm">탈퇴</button>
            </div>
        </div>
    </div>
    <div id="editGroupModal" class="hidden fixed inset-0 bg-black/50 backdrop-blur-sm z-[9999] flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-lg rounded-2xl shadow-2xl border border-gray-100 animate-in fade-in zoom-in duration-300 overflow-hidden">

            <div class="px-8 py-6 bg-gray-50/50 border-b border-gray-100 flex items-center justify-between">
                <div>
                    <h3 class="text-xl font-bold text-gray-900">그룹 정보 수정</h3>
                    <p class="text-xs text-gray-400 mt-1">그룹의 이름과 설명을 변경할 수 있습니다.</p>
                </div>
                <button onclick="closeEditModal()" class="text-gray-400 hover:text-black transition-colors">
                    <i class="fa-solid fa-xmark text-xl"></i>
                </button>
            </div>

            <form id="editGroupForm" th:data-group-id="${group.id}" class="p-8 space-y-6" method="POST" enctype="multipart/form-data">

                <div>
                    <label class="block text-[12px] font-bold text-gray-600 mb-3 ml-1 uppercase tracking-tight">그룹 로고 변경</label>
                    <div class="flex items-center gap-6">
                        <div id="editPreviewContainer" class="w-24 h-24 rounded-2xl bg-gray-100 border-2 border-dashed border-indigo-200 flex items-center justify-center shrink-0 overflow-hidden relative group">
                            <img th:if="${group.groupImage != null}"
                                 th:src="@{|/group/${group.groupImage}|}"
                                 class="w-full h-full object-cover shadow-sm"
                                 alt="그룹 로고">
                            <i th:unless="${group.groupImage != null}"
                               class="fa-solid fa-users text-4xl text-gray-300"></i>
                            <div class="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center text-white text-[10px] font-bold pointer-events-none uppercase tracking-widest">
                                변경하기
                            </div>
                        </div>

                        <div class="flex-1">
                            <label class="relative cursor-pointer">
                                <input type="file" id="editImageInput" name="groupImage" accept="image/*" class="hidden" onchange="previewEditImage(this)">
                                <div class="px-4 py-2.5 bg-white border border-gray-300 rounded-xl text-xs font-bold text-gray-700 hover:border-indigo-500 hover:bg-indigo-50 transition-all inline-flex items-center gap-2 shadow-sm">
                                    <i class="fa-solid fa-camera text-gray-400"></i> 새로운 사진 선택
                                </div>
                            </label>
                            <button type="button" onclick="resetToDefault()" class="block mt-2 text-[11px] text-gray-400 hover:text-red-500 font-medium underline underline-offset-4">기본 이미지로 변경</button>
                        </div>
                    </div>
                </div>

                <div>
                    <label class="block text-[12px] font-bold text-gray-600 mb-2 ml-1 uppercase tracking-tight">그룹 이름</label>
                    <input type="text" name="name" th:value="${group.name}"
                           class="w-full px-4 py-3.5 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:bg-white focus:border-indigo-500 outline-none transition-all text-sm font-bold text-gray-800">
                </div>

                <div>
                    <label class="block text-[12px] font-bold text-gray-600 mb-2 ml-1 uppercase tracking-tight">그룹 설명</label>
                    <textarea rows="3" name="description" th:text="${group.description}"
                              class="w-full px-4 py-3.5 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:bg-white focus:border-indigo-500 outline-none transition-all text-sm resize-none text-gray-600 leading-relaxed">서비스 개발 및 시스템 유지보수를 담당하는 공식 그룹입니다.</textarea>
                </div>

                <div class="flex items-center gap-3 pt-6 border-t border-gray-50">
                    <button type="button" onclick="closeEditModal()"
                            class="flex-1 py-3.5 text-gray-400 font-bold hover:text-gray-600 transition-all text-sm">
                        취소
                    </button>
                    <button type="submit"
                            class="flex-[2] py-3.5 bg-gray-800 hover:bg-black text-white font-bold rounded-xl shadow-lg shadow-indigo-100 transition-all text-sm">
                        수정하기
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
</html>
