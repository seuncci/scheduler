spring:
  application:
    name: scheduler

  datasource:
    url: jdbc:postgresql://ep-winter-sun-apemgpdg-pooler.c-7.us-east-1.aws.neon.tech/neondb?sslmode=require&channelBinding=require
    driver-class-name: org.postgresql.Driver
    username: ${NEON_DB_USER}
    password: ${NEON_DB_PASS}

  h2:
    console:
      enabled: true

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB

